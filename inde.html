<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Eksperimen & Administrasi LPQ</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(16, 185, 129, 0.5); border-radius: 10px; }
    @media print { 
      @page { size: A4 portrait; margin: 0; } 
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; } 
      .print\:hidden { display: none !important; }
      .print\:m-0 { margin: 0 !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:bg-white { background-color: white !important; }
      .print\:shadow-none { box-shadow: none !important; }
      .print\:border-none { border: none !important; }
      .print\:w-full { width: 100% !important; }
      .print\:h-full { height: 100% !important; }
      aside, header, button:not(.print-btn) { display: none !important; }
      main { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // API Key Anda yang baru (sudah dimasukkan)
    const apiKey = "AQ.Ab8RN6K3KruSmXttd5sJKWrnrZ2xP_FUfzEyTlP8LEoWdifdcQ"; 

    // URL Aplikasi GAS Anda (Biarkan kosong jika hanya ingin tes di browser lokal dulu)
    const apiUrl = "GANTI_DENGAN_URL_WEB_APP_GAS_ANDA"; 

    const FAIcon = (faClass) => ({ size = 24, color, className = "" }) => {
      return (
        <span className={`inline-flex items-center justify-center ${className}`} style={{ color: color, width: size, height: size }}>
          <i className={`fa-solid ${faClass}`} style={{ fontSize: size * 0.8 }}></i>
        </span>
      );
    };

    const Upload = FAIcon('fa-upload');
    const FileText = FAIcon('fa-file-lines');
    const CheckCircle = FAIcon('fa-circle-check');
    const User = FAIcon('fa-user');
    const ShieldCheck = FAIcon('fa-shield-halved');
    const Users = FAIcon('fa-users');
    const FileSignature = FAIcon('fa-file-signature');
    const AlertCircle = FAIcon('fa-circle-exclamation');
    const Timer = FAIcon('fa-stopwatch');
    const Download = FAIcon('fa-download');
    const BarChart = FAIcon('fa-chart-column');
    const Database = FAIcon('fa-database');
    const RefreshCw = FAIcon('fa-arrows-rotate');
    const UserCheck = FAIcon('fa-user-check');
    const ClipboardList = FAIcon('fa-clipboard-list');
    const BookOpen = FAIcon('fa-book-open');
    const LineChart = FAIcon('fa-chart-line');
    const Activity = FAIcon('fa-wave-square');
    const X = FAIcon('fa-xmark');
    const LogOut = FAIcon('fa-right-from-bracket');
    const PlusCircle = FAIcon('fa-circle-plus');
    const Clock = FAIcon('fa-clock');
    const QrCode = FAIcon('fa-qrcode');
    const FileSearch = FAIcon('fa-file-code');
    const FileCheck = FAIcon('fa-file-circle-check');
    const Search = FAIcon('fa-magnifying-glass');
    const Lock = FAIcon('fa-lock');
    const MessageSquare = FAIcon('fa-comments');

    function App() {
      const [testerInfo, setTesterInfo] = useState(null);
      const [currentRole, setCurrentRole] = useState(null); 
      
      const [santriData, setSantriData] = useState([]);
      const [ustadzData, setUstadzData] = useState([]);
      const [dokumenReq, setDokumenReq] = useState([]);
      const [researchLogs, setResearchLogs] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 5000);
      };

      const hasOcrSantri = researchLogs.some(l => l.target === 'Santri' && l.method === 'OCR Gemini AI');
      const hasOcrUstadz = researchLogs.some(l => l.target === 'Ustadz' && l.method === 'OCR Gemini AI');
      const hasManual = researchLogs.some(l => l.method === 'Manual');
      const isKuisionerUnlocked = hasOcrSantri && hasOcrUstadz && hasManual;

      if (!testerInfo && currentRole !== 'admin' && currentRole !== 'public') {
        return (
          <React.Fragment>
            <WelcomeTesterScreen setTesterInfo={setTesterInfo} setRole={setCurrentRole} showToast={showToast} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }

      if (!currentRole) {
        return (
          <React.Fragment>
            <LoginScreen setRole={setCurrentRole} testerInfo={testerInfo} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }

      if (currentRole === 'public') {
        return (
          <React.Fragment>
            <PublicVerificationScreen onBack={() => { setCurrentRole(null); setActiveTab('dashboard'); }} dokumenReq={dokumenReq} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }
      
      return (
        <div className="min-h-screen flex flex-col md:flex-row font-sans">
          <aside className="w-full md:w-72 bg-emerald-900 text-white flex flex-col shadow-2xl z-10 print:hidden relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-800 rounded-full blur-3xl opacity-50 -translate-y-10 translate-x-10 pointer-events-none"></div>
            
            <div className="p-8 text-center border-b border-emerald-800 relative z-10">
              <div className="bg-white p-2 rounded-2xl w-24 h-24 mx-auto mb-4 flex items-center justify-center shadow-lg overflow-hidden border-2 border-emerald-100 transition-transform hover:scale-105">
                {currentRole === 'admin' ? <Activity color="#064e3b" size={48} /> : testerInfo?.logo ? <img src={testerInfo.logo} alt="Logo" className="w-full h-full object-contain" /> : <FileSignature color="#064e3b" size={48} />}
              </div>
              <h1 className="font-bold text-xl leading-tight line-clamp-2 tracking-wide text-emerald-50">{currentRole === 'admin' ? 'Pusat Riset Bab 4' : (testerInfo?.lembaga || 'Portal Riset')}</h1>
              <p className="text-emerald-400 text-xs mt-2 px-2 uppercase font-semibold tracking-widest">{currentRole === 'admin' ? 'Dashboard Peneliti' : 'SIAKAD Prototype'}</p>
            </div>
            
            <nav className="flex-1 p-4 space-y-1.5 overflow-y-auto relative z-10 custom-scrollbar">
              {currentRole === 'admin' && (
                <SidebarItem icon={<LineChart />} label="Dashboard Statistik" active={activeTab === 'admin-dashboard'} onClick={() => setActiveTab('admin-dashboard')} />
              )}
              {currentRole === 'operator' && (
                <React.Fragment>
                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-4 px-3">Eksperimen Waktu</p>
                  <SidebarItem icon={<Users />} label="Simulasi Entri Santri" active={activeTab === 'ocr-santri'} onClick={() => setActiveTab('ocr-santri')} />
                  <SidebarItem icon={<UserCheck />} label="Simulasi Entri Ustadz" active={activeTab === 'ocr-ustadz'} onClick={() => setActiveTab('ocr-ustadz')} />
                  <SidebarItem icon={<BarChart />} label="Laporan Metrik" active={activeTab === 'report'} onClick={() => setActiveTab('report')} />
                  
                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-6 px-3">Evaluasi</p>
                  <SidebarItem 
                      icon={isKuisionerUnlocked ? <MessageSquare /> : <Lock />} 
                      label="Kuisioner Kepuasan" 
                      active={activeTab === 'kuisioner'} 
                      onClick={() => {
                          if (isKuisionerUnlocked) setActiveTab('kuisioner');
                          else showToast("Selesaikan minimal 1x OCR Santri, 1x OCR Ustadz, dan 1x Manual untuk membuka kuisioner!", "error");
                      }} 
                  />

                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-6 px-3">Modul Administrasi</p>
                  <SidebarItem icon={<FileText />} label="Pengajuan Surat" active={activeTab === 'request'} onClick={() => setActiveTab('request')} />
                  <SidebarItem icon={<FileCheck />} label="Arsip & Cetak Dokumen" active={activeTab === 'arsip'} onClick={() => setActiveTab('arsip')} />
                </React.Fragment>
              )}
              {currentRole === 'kepala' && (
                <React.Fragment>
                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-4 px-3">Otoritas Pimpinan</p>
                  <SidebarItem icon={<ShieldCheck />} label="Approval Pengajuan" active={activeTab === 'approval'} onClick={() => setActiveTab('approval')} />
                  <SidebarItem icon={<FileCheck />} label="Arsip Dokumen Resmi" active={activeTab === 'arsip'} onClick={() => setActiveTab('arsip')} />
                </React.Fragment>
              )}
            </nav>

            <div className="p-5 bg-emerald-950/50 backdrop-blur-md relative z-10 border-t border-emerald-800/50">
              <div className="flex items-center gap-3 mb-5 px-1">
                <div className="bg-emerald-800 rounded-xl p-2 shadow-inner border border-emerald-700/50"><User size={20} className="text-emerald-300" /></div>
                <div className="overflow-hidden">
                  <p className="font-bold text-sm capitalize truncate text-emerald-50">{currentRole === 'admin' ? 'Peneliti Utama' : testerInfo?.nama}</p>
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-emerald-400 truncate">Sesi Aktif ({currentRole})</p>
                </div>
              </div>
              <button onClick={() => { setTesterInfo(null); setCurrentRole(null); setActiveTab('dashboard'); }} className="w-full flex items-center justify-center gap-2 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white py-2.5 rounded-xl transition-all duration-200 font-bold text-sm border border-red-500/20 shadow-sm hover:shadow-red-500/30">
                <LogOut size={16} /> Ganti Sesi Akses
              </button>
            </div>
          </aside>

          <main className="flex-1 p-6 md:p-10 overflow-y-auto bg-[#F8FAFC] print:p-0 print:m-0 print:bg-white relative selection:bg-emerald-200">
            {activeTab === 'admin-dashboard' && <AdminDashboardView localLogs={researchLogs} />}
            
            {activeTab === 'ocr-santri' && <ExperimentEntryView targetType="santri" targetData={santriData} setTargetData={setSantriData} researchLogs={researchLogs} setResearchLogs={setResearchLogs} testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'ocr-ustadz' && <ExperimentEntryView targetType="ustadz" targetData={ustadzData} setTargetData={setUstadzData} researchLogs={researchLogs} setResearchLogs={setResearchLogs} testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'report' && <ResearchReportView researchLogs={researchLogs} showToast={showToast} />}
            {activeTab === 'kuisioner' && <KuisionerView showToast={showToast} />}
            
            {activeTab === 'request' && <RequestDocumentView ustadzData={ustadzData} dokumenReq={dokumenReq} setDokumenReq={setDokumenReq} showToast={showToast} />}
            {activeTab === 'approval' && <ApprovalView dokumenReq={dokumenReq} setDokumenReq={setDokumenReq} showToast={showToast} />}
            {activeTab === 'arsip' && <ArsipView dokumenReq={dokumenReq} testerInfo={testerInfo} />}
            
            {activeTab === 'dashboard' && (
              <div className="flex flex-col items-center justify-center h-full text-center text-emerald-900/60 animate-fade-in max-w-2xl mx-auto">
                <div className="bg-emerald-100/50 p-6 rounded-3xl mb-6 shadow-inner border border-emerald-50">
                  {currentRole === 'admin' ? <LineChart size={64} className="text-emerald-600" /> : <BookOpen size={64} className="text-emerald-600" />}
                </div>
                <h2 className="text-3xl font-extrabold text-slate-800 mb-3">Selamat Datang di SIAKAD</h2>
                <p className="text-slate-500 leading-relaxed">
                  Prototipe ini dirancang untuk penelitian eksperimental fungsional perangkat lunak. Sistem menggunakan <b>Gemini AI</b> untuk mengekstrak data dari dokumen.
                </p>
                <div className="mt-8 flex flex-wrap justify-center gap-3">
                    <span className="px-4 py-2 bg-white shadow-sm border rounded-full text-xs font-bold text-slate-600 flex items-center gap-2"><ShieldCheck size={14} className="text-emerald-500"/> Privasi Terjamin</span>
                    <span className="px-4 py-2 bg-white shadow-sm border rounded-full text-xs font-bold text-slate-600 flex items-center gap-2"><Timer size={14} className="text-blue-500"/> Akurasi Waktu</span>
                    <span className="px-4 py-2 bg-white shadow-sm border rounded-full text-xs font-bold text-slate-600 flex items-center gap-2"><Database size={14} className="text-purple-500"/> Gemini AI Powered</span>
                </div>
              </div>
            )}
          </main>

          <ToastNotification toast={toast} setToast={setToast} />
        </div>
      );
    }

    function ToastNotification({ toast, setToast }) {
      if (!toast.show) return null;
      return (
        <div className={`fixed bottom-6 right-6 p-4 rounded-2xl shadow-2xl text-white font-bold z-50 flex items-center gap-4 animate-fade-in max-w-sm border-2 ${toast.type === 'error' ? 'bg-red-600 border-red-500 shadow-red-500/30' : toast.type === 'success' ? 'bg-emerald-600 border-emerald-500 shadow-emerald-500/30' : 'bg-blue-600 border-blue-500 shadow-blue-500/30'}`}>
           <div className="bg-white/20 p-2 rounded-xl flex-shrink-0">
              {toast.type === 'error' ? <AlertCircle size={20} /> : toast.type === 'success' ? <CheckCircle size={20} /> : <Activity size={20} />}
           </div>
           <p className="flex-1 text-sm leading-snug">{toast.message}</p>
           <button onClick={() => setToast({ show: false, message: '', type: 'info' })} className="opacity-70 hover:opacity-100 flex-shrink-0 transition bg-black/10 hover:bg-black/20 p-1.5 rounded-lg"><X size={16}/></button>
        </div>
      );
    }

    function WelcomeTesterScreen({ setTesterInfo, setRole, showToast }) {
      const [nama, setNama] = useState('');
      const [lembaga, setLembaga] = useState('');
      const [alamat, setAlamat] = useState('');
      const [nomorIjop, setNomorIjop] = useState('');
      const [nomorStatistik, setNomorStatistik] = useState('');
      const [logo, setLogo] = useState(null);
      const [secretClicks, setSecretClicks] = useState(0);

      const handleLogoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setLogo(reader.result); };
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if(nama.trim() && lembaga.trim() && alamat.trim()) {
          setTesterInfo({ nama, lembaga, alamat, nomorIjop, nomorStatistik, logo });
        } else showToast("Nama, Lembaga, dan Alamat wajib diisi.", "error");
      };

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] relative overflow-hidden">
          <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-600/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>
          <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>

          <div className="bg-white/95 backdrop-blur-xl p-8 rounded-[2rem] shadow-2xl w-full max-w-lg animate-fade-in relative z-10 border border-white/40">
            <div className="text-center mb-8">
              <div className="bg-emerald-100/80 w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-5 select-none cursor-default shadow-inner border border-emerald-200" onClick={() => { const n = secretClicks + 1; if (n >= 7) setRole('admin'); else setSecretClicks(n); }}>
                <ClipboardList color="#059669" size={36} />
              </div>
              <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">Setup Profil Lembaga</h1>
              <p className="text-slate-500 text-sm mt-2 font-medium">Data ini digunakan untuk men-generate Kop Surat secara otomatis di akhir eksperimen.</p>
            </div>
            
            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Nama Lengkap Penguji <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: Ahmad Subagyo" className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition font-medium" value={nama} onChange={(e) => setNama(e.target.value)} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Nama Lembaga <span className="text-slate-400 font-normal normal-case">(Tanpa kata TPQ/LPQ)</span> <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: Miftahul Ulum" className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition font-medium" value={lembaga} onChange={(e) => setLembaga(e.target.value)} />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Nomor Ijop</label>
                    <input type="text" placeholder="Opsional" className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition font-medium" value={nomorIjop} onChange={(e) => setNomorIjop(e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Nomor Statistik</label>
                    <input type="text" placeholder="Opsional" className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition font-medium" value={nomorStatistik} onChange={(e) => setNomorStatistik(e.target.value)} />
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wider">Alamat Sekretariat Lengkap <span className="text-red-500">*</span></label>
                  <textarea required placeholder="Jalan, RT/RW, Desa, Kec, Kab..." className="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition font-medium resize-none h-24" value={alamat} onChange={(e) => setAlamat(e.target.value)}></textarea>
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-700 mb-2 uppercase tracking-wider">Logo Lembaga <span className="text-slate-400 font-normal normal-case">(Opsional)</span></label>
                  <div className="flex items-center gap-4">
                    <div className="w-16 h-16 rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 flex items-center justify-center overflow-hidden">
                      {logo ? <img src={logo} className="w-full h-full object-contain"/> : <Upload color="#94a3b8" size={24} />}
                    </div>
                    <label className="flex-1 cursor-pointer bg-slate-50 border border-slate-200 hover:bg-slate-100 p-3 rounded-xl text-sm font-semibold text-slate-600 text-center transition">
                      Pilih File Logo
                      <input type="file" accept="image/*" onChange={handleLogoChange} className="hidden" />
                    </label>
                  </div>
                </div>
              </div>
              <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-600/30 mt-8 transition-transform hover:-translate-y-1">
                Lanjutkan ke Sistem
              </button>
            </form>
          </div>
        </div>
      );
    }

    function LoginScreen({ setRole, testerInfo }) {
      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 relative overflow-hidden">
          <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-600/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>

          <div className="bg-white/95 backdrop-blur-xl p-10 rounded-[2rem] shadow-2xl w-full max-w-md text-center animate-fade-in relative z-10">
            <div className="bg-emerald-100/80 w-28 h-28 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner overflow-hidden border-4 border-white">
              {testerInfo.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain bg-white" /> : <ShieldCheck color="#059669" size={56} />}
            </div>
            <h1 className="text-2xl font-extrabold text-slate-800 mb-1">{testerInfo.lembaga}</h1>
            <p className="text-emerald-600 text-sm font-bold mb-8 tracking-wide">Penguji: {testerInfo.nama}</p>
            
            <div className="space-y-4">
              <button onClick={() => setRole('operator')} className="w-full flex items-center p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-blue-500 hover:shadow-lg hover:shadow-blue-500/10 transition-all group">
                <div className="bg-blue-50 p-4 rounded-xl group-hover:bg-blue-500 group-hover:scale-110 transition-all duration-300"><User className="text-blue-600 group-hover:text-white" size={28} /></div>
                <div className="ml-5 text-left"><h3 className="font-extrabold text-slate-800 text-lg">Staf Operator</h3><p className="text-xs text-slate-500 font-medium">Uji Coba Entri Data OCR Gemini</p></div>
              </button>
              
              <button onClick={() => setRole('kepala')} className="w-full flex items-center p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-purple-500 hover:shadow-lg hover:shadow-purple-500/10 transition-all group">
                <div className="bg-purple-50 p-4 rounded-xl group-hover:bg-purple-500 group-hover:scale-110 transition-all duration-300"><CheckCircle className="text-purple-600 group-hover:text-white" size={28} /></div>
                <div className="ml-5 text-left"><h3 className="font-extrabold text-slate-800 text-lg">Pimpinan LPQ</h3><p className="text-xs text-slate-500 font-medium">Tanda Tangan & Persetujuan</p></div>
              </button>

              <div className="relative py-4">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                <div className="relative flex justify-center"><span className="bg-white px-4 text-[10px] text-slate-400 font-black tracking-widest">AKSES PUBLIK</span></div>
              </div>

    function AddressCascader({ formData, setFormData, prefix = '' }) {
        const getField = (field) => prefix ? `${prefix}${field.charAt(0).toUpperCase() + field.slice(1)}` : field;

        const [provinces, setProvinces] = useState([]);
        const [regencies, setRegencies] = useState([]);
        const [districts, setDistricts] = useState([]);
        const [villages, setVillages] = useState([]);

        useEffect(() => {
            fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json')
                .then(res => res.json())
                .then(setProvinces).catch(console.error);
        }, []);

        const handleChange = (e, level) => {
            const name = e.target.value;
            const id = e.target.selectedOptions?.[0]?.dataset?.id;
            
            if (level === 'provinsi') {
                setFormData(prev => ({ ...prev, [getField('provinsi')]: name, [getField('kabupaten')]: '', [getField('kecamatan')]: '', [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${id}.json`).then(r => r.json()).then(setRegencies);
                else setRegencies([]);
                setDistricts([]); setVillages([]);
            } else if (level === 'kabupaten') {
                setFormData(prev => ({ ...prev, [getField('kabupaten')]: name, [getField('kecamatan')]: '', [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`).then(r => r.json()).then(setDistricts);
                else setDistricts([]);
                setVillages([]);
            } else if (level === 'kecamatan') {
                setFormData(prev => ({ ...prev, [getField('kecamatan')]: name, [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/villages/${id}.json`).then(r => r.json()).then(setVillages);
                else setVillages([]);
            } else if (level === 'desa') {
                setFormData(prev => ({ ...prev, [getField('desa')]: name }));
            } else {
                setFormData(prev => ({ ...prev, [getField(level)]: name }));
            }
        };

        return (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                <select value={formData[getField('provinsi')] || ''} onChange={(e) => handleChange(e, 'provinsi')} className="w-full bg-white border border-slate-300 p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs">
                    <option value="">-- Pilih Provinsi --</option>
                    {provinces.map(p => <option key={p.id} data-id={p.id} value={p.name}>{p.name}</option>)}
                </select>
                <select value={formData[getField('kabupaten')] || ''} onChange={(e) => handleChange(e, 'kabupaten')} disabled={!regencies.length} className="w-full bg-white border border-slate-300 p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs disabled:opacity-50">
                    <option value="">-- Pilih Kab/Kota --</option>
                    {regencies.map(r => <option key={r.id} data-id={r.id} value={r.name}>{r.name}</option>)}
                </select>
                <select value={formData[getField('kecamatan')] || ''} onChange={(e) => handleChange(e, 'kecamatan')} disabled={!districts.length} className="w-full bg-white border border-slate-300 p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs disabled:opacity-50">
                    <option value="">-- Pilih Kecamatan --</option>
                    {districts.map(d => <option key={d.id} data-id={d.id} value={d.name}>{d.name}</option>)}
                </select>
                <select value={formData[getField('desa')] || ''} onChange={(e) => handleChange(e, 'desa')} disabled={!villages.length} className="w-full bg-white border border-slate-300 p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs disabled:opacity-50">
                    <option value="">-- Pilih Desa --</option>
                    {villages.map(v => <option key={v.id} data-id={v.id} value={v.name}>{v.name}</option>)}
                </select>

            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (e) {
                if (i === retries - 1) throw e;
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }

          try {
            const reader = new FileReader();

                        role: "user",

                            { inlineData: { mimeType: rawFile.type, data: base64Data } }
                        ]

                    generationConfig: { 
                        responseMimeType: "application/json", 
                        responseSchema: { 
                            type: "OBJECT", 
                            properties: { ibuNik: { type: "STRING" }, ibuNama: { type: "STRING" }, ibuStatusPernikahan: { type: "STRING" }, ibuNoKk: { type: "STRING" } }

                      <tr key={req.id} className="border-b border-slate-50 hover:bg-slate-50">
                        <td className="p-5 font-bold text-slate-800">{req.nama}</td><td className="p-5 font-medium">{req.jenis}</td>
                        <td className="p-5">{req.status === 'Pending' ? <span className="bg-amber-100 text-amber-700 border border-amber-200 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 w-max"><Clock size={12}/> Review Pimpinan</span> : <span className="bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 w-max"><CheckCircle size={12}/> Dokumen TTE Terbit</span>}</td>
                      </tr>
                    ))}
                    {dokumenReq.length === 0 && <tr><td colSpan="3" className="text-center p-16"><FileText size={48} className="mx-auto text-slate-300 mb-4"/><p className="text-slate-400 font-medium">Belum ada pengajuan surat yang dicatat.</p></td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ApprovalView({ dokumenReq, setDokumenReq, showToast }) {
      const handleApprove = (reqId) => {
        const generatedDocId = `DOC-LPQ-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
        setDokumenReq(dokumenReq.map(req => req.id === reqId ? { ...req, status: 'Disetujui', docId: generatedDocId } : req));
        showToast("Dokumen disetujui. Tanda Tangan QR berhasil digenerate.", "success");
      };
      const pendingReqs = dokumenReq.filter(r => r.status === 'Pending');

      return (
        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden animate-fade-in max-w-5xl mx-auto">
          <div className="p-6 bg-amber-50 border-b border-amber-100 flex items-center gap-3"><AlertCircle className="text-amber-600"/><h3 className="font-extrabold text-amber-900 text-lg">Menunggu Tanda Tangan Anda (Pimpinan)</h3></div>
          <div className="overflow-x-auto p-4">
            <table className="w-full text-left text-sm text-slate-600">
              <thead className="uppercase text-[10px] font-extrabold tracking-widest text-slate-400 border-b border-slate-100"><tr><th className="p-4">Identitas Pemohon</th><th className="p-4">Klasifikasi Surat</th><th className="p-4 text-right">Otorisasi</th></tr></thead>
              <tbody>
                {pendingReqs.map(req => (
                  <tr key={req.id} className="border-b border-slate-50 hover:bg-slate-50">
                    <td className="p-4"><p className="font-black text-slate-800 text-base">{req.nama}</p><p className="text-xs font-mono text-slate-400 mt-1">{req.id}</p></td>
                    <td className="p-4 font-semibold text-slate-700">{req.jenis}</td>
                    <td className="p-4 text-right"><button onClick={() => handleApprove(req.id)} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-emerald-700 transition shadow-md shadow-emerald-600/20 flex items-center gap-2 ml-auto"><QrCode size={14}/> Setujui & Beri TTE QR</button></td>
                  </tr>
                ))}
                {pendingReqs.length === 0 && <tr><td colSpan="3" className="text-center p-20 text-slate-400 font-medium"><CheckCircle size={48} className="mx-auto mb-4 text-slate-200"/>Semua dokumen telah diperiksa. Meja kerja Anda bersih.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ArsipView({ dokumenReq, testerInfo }) {
      const [selectedDoc, setSelectedDoc] = useState(null);
      const approvedReqs = dokumenReq.filter(r => r.status === 'Disetujui');

      return (
        <div className="animate-fade-in print:m-0 print:p-0 max-w-6xl mx-auto">
          <header className="mb-8 border-b pb-4 print:hidden"><h2 className="text-3xl font-extrabold text-slate-800">Arsip Dokumen Tercetak</h2><p className="text-slate-500 font-medium mt-1">Dokumen resmi yang telah melewati validasi TTE QR Code siap diunduh/dicetak.</p></header>

          {!selectedDoc ? (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {approvedReqs.map(doc => (
                <div key={doc.id} className="bg-white p-7 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-200 transition group flex flex-col justify-between">
                  <div>
                     <div className="flex justify-between items-start mb-4">
                        <div className="bg-slate-100 p-3 rounded-2xl text-slate-600 group-hover:bg-emerald-100 group-hover:text-emerald-600 transition"><FileText size={24} /></div>
                        <span className="text-[10px] font-mono font-bold bg-slate-50 px-2.5 py-1 rounded-lg border text-slate-500">{doc.docId}</span>
                     </div>
                     <h4 className="font-extrabold text-slate-800 text-lg line-clamp-2 leading-tight">{doc.jenis}</h4>
                     <p className="text-sm text-slate-500 mt-2 font-medium">A.n. <b className="text-slate-700">{doc.nama}</b></p>
                  </div>
                  <button onClick={() => setSelectedDoc(doc)} className="w-full bg-slate-50 border border-slate-200 text-slate-700 py-3 rounded-xl text-sm font-bold mt-6 group-hover:bg-emerald-600 group-hover:border-emerald-600 group-hover:text-white transition flex items-center justify-center gap-2"><Search size={16}/> Pratinjau Surat</button>
                </div>
              ))}
              {approvedReqs.length === 0 && <div className="col-span-full text-center py-24 bg-white border-2 border-dashed border-slate-200 rounded-3xl"><FileSearch size={48} className="mx-auto text-slate-300 mb-4"/><p className="font-bold text-slate-400">Belum ada dokumen yang diterbitkan.</p></div>}
            </div>
          ) : (
            <div className="bg-slate-200 rounded-[2rem] shadow-2xl border border-slate-300 max-w-4xl mx-auto pb-12 print:shadow-none print:border-none print:bg-white print:pb-0 overflow-hidden">
              <div className="bg-slate-800 p-5 flex justify-between items-center text-white print:hidden">
                <span className="font-mono text-sm font-bold flex items-center gap-2"><ClipboardList size={18}/> Pratinjau Mode Cetak Kertas (A4)</span>
                <div className="flex gap-3">
                  <button onClick={() => window.print()} className="bg-emerald-500 hover:bg-emerald-400 text-emerald-950 font-bold px-5 py-2 rounded-xl text-sm flex items-center gap-2 transition"><Download size={16}/> Cetak / PDF</button>
                  <button onClick={() => setSelectedDoc(null)} className="bg-slate-700 hover:bg-slate-600 px-5 py-2 rounded-xl text-sm font-bold transition">Tutup Pratinjau</button>
                </div>
              </div>
              
              <div className="mx-auto mt-10 bg-white text-black shadow-2xl print:shadow-none print:mt-0 print:w-full relative" style={{ width: '210mm', minHeight: '297mm', padding: '20mm' }}>
                <div className="flex flex-col mb-8">
                  <div className="flex items-center justify-between mb-3">
                    <div className="w-[110px] h-[110px] flex items-center justify-center flex-shrink-0">
                      {testerInfo?.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain" /> : <div className="w-20 h-20 border-2 border-gray-300 border-dashed rounded-full flex items-center justify-center text-gray-400 font-bold text-xs">LOGO</div>}
                    </div>
                    <div className="flex-1 text-center px-4">
                      <h1 style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: "14pt", fontWeight: "bold", textTransform: "uppercase", marginBottom: "4px" }}>TAMAN PENDIDIKAN AL QURAN</h1>
                      <h2 style={{ fontFamily: "'Bookman Old Style', serif", fontSize: "18pt", fontWeight: "bold", marginBottom: "4px" }}>{testerInfo?.lembaga || '(Nama Lembaga)'}</h2>
                      <p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: "12pt" }}>Nomor Izin Operasional: {testerInfo?.nomorIjop || '-'} <br/> NSDT : {testerInfo?.nomorStatistik || '-'}</p>
                    </div>
                    <div className="w-[110px] h-[110px] flex-shrink-0 opacity-0 pointer-events-none"></div>
                  </div>
                  <div className="bg-black w-full py-1.5 px-4 text-center mb-1"><p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: "11pt", color: "white", margin: 0 }}>Sekretariat : {testerInfo?.alamat}</p></div>
                  <div className="border-b-[4px] border-black w-full mb-1"></div><div className="border-b border-black w-full"></div>
                </div>
                
                <h3 className="text-xl font-bold underline mb-10 uppercase tracking-widest text-center mt-6">{selectedDoc.jenis}</h3>
                <p className="text-left mb-6 text-lg leading-relaxed">Yang bertanda tangan di bawah ini, Kepala {testerInfo?.lembaga || 'Lembaga Pendidikan Al-Quran'}, menerangkan dengan sesungguhnya bahwa:</p>
                
                <table className="text-left mb-10 mx-auto w-10/12 text-lg">
                  <tbody>
                    <tr><td className="py-3 w-2/5 font-semibold align-top">Nama Lengkap</td><td className="py-3 px-3 align-top">:</td><td className="py-3 font-bold uppercase">{selectedDoc.nama}</td></tr>
                    <tr><td className="py-3 font-semibold align-top">Tempat, Tgl Lahir</td><td className="py-3 px-3 align-top">:</td><td className="py-3 capitalize">{selectedDoc.ttl}</td></tr>
                    <tr><td className="py-3 font-semibold align-top">Alamat Domisili</td><td className="py-3 px-3 align-top">:</td><td className="py-3 leading-relaxed capitalize">{selectedDoc.alamat}</td></tr>
                  </tbody>
                </table>
                
                <p className="text-left mb-20 text-lg leading-loose text-justify">Adalah benar yang bersangkutan merupakan tenaga pendidik/staf yang aktif di lembaga kami. Demikian dokumen administrasi ini dibuat secara sah melalui sistem terpadu untuk dapat dipergunakan sebagaimana mestinya.</p>
                
                <div className="flex justify-end pr-4">
                  <div className="text-center">
                    <p className="mb-2 text-lg">{testerInfo?.alamat?.split(',')[0] || 'Kota'}, {new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                    <p className="mb-6 text-lg font-bold">Kepala Lembaga,</p>
                    <div className="relative inline-block border-4 border-emerald-900 p-2 rounded-xl mb-3 bg-white">
                      <img src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${selectedDoc.docId}`} alt="QR Code TTE" className="w-28 h-28 mix-blend-multiply" />
                      <div className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 bg-white px-3 py-0.5 text-[11px] font-black text-emerald-900 border-2 border-emerald-900 rounded-full">TTE SAH</div>
                    </div>
                    <p className="text-sm font-mono font-bold text-slate-800 bg-slate-100 py-1.5 px-4 rounded-lg mt-3 uppercase border border-slate-300">ID: {selectedDoc.docId}</p>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PublicVerificationScreen({ onBack, dokumenReq }) {
      const [searchInput, setSearchInput] = useState('');
      const [result, setResult] = useState(null); 
      const [docData, setDocData] = useState(null);

      const handleVerify = (e) => {
        e.preventDefault();
        const foundDoc = dokumenReq.find(d => d.docId === searchInput.trim().toUpperCase() && d.status === 'Disetujui');
        if (foundDoc) { setDocData(foundDoc); setResult('found'); } 
        else { setDocData(null); setResult('not_found'); }
      };

      return (
        <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] relative">
          <div className="absolute top-0 right-0 w-96 h-96 bg-blue-600/20 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>

          <div className="w-full max-w-lg relative z-10">
            <button onClick={onBack} className="text-white font-bold mb-6 flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 py-2.5 rounded-xl border border-white/20 backdrop-blur-sm transition">Kembali ke Beranda</button>
            <div className="bg-white p-10 rounded-[2rem] shadow-2xl border-t-8 border-t-blue-500 text-center">
              <div className="bg-blue-100 w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-6"><QrCode className="text-blue-600" size={40} /></div>
              <h2 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">Verifikasi Publik QR</h2>
              <p className="text-slate-500 font-medium mb-8">Masukkan ID Dokumen (Contoh: DOC-LPQ-XXXX) yang tertera di bawah QR Code Surat.</p>
              
              <form onSubmit={handleVerify} className="mb-8 relative">
                <input type="text" placeholder="ID DOKUMEN" className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl py-4 pl-5 pr-32 text-xl font-mono uppercase font-black text-center text-slate-800 focus:border-blue-500 outline-none transition" value={searchInput} onChange={(e) => setSearchInput(e.target.value)} />
                <button type="submit" className="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white px-6 rounded-xl font-bold transition shadow-md shadow-blue-600/30"><Search size={20}/></button>
              </form>

              {result === 'not_found' && (
                <div className="bg-red-50 text-red-800 p-6 rounded-2xl border border-red-200 animate-fade-in text-left flex gap-4 items-start">
                  <div className="bg-red-200 p-2 rounded-full flex-shrink-0"><X className="text-red-600" size={24} /></div>
                  <div><p className="font-black text-lg leading-none mb-1 text-red-900">DOKUMEN TIDAK VALID</p><p className="text-sm font-medium">Sistem kami tidak menemukan rekam jejak Tanda Tangan Elektronik dengan ID tersebut.</p></div>
                </div>
              )}
              {result === 'found' && docData && (
                <div className="bg-emerald-50 text-emerald-900 p-6 rounded-2xl border border-emerald-200 animate-fade-in text-left">
                  <div className="flex items-center gap-3 border-b border-emerald-200/60 pb-4 mb-4"><div className="bg-emerald-500 text-white p-1.5 rounded-full"><CheckCircle size={20} /></div><span className="font-black text-xl tracking-wide text-emerald-800">DOKUMEN ASLI & SAH</span></div>
                  <div className="space-y-4">
                    <div><p className="text-[10px] font-black text-emerald-600/60 uppercase tracking-widest mb-1">ID Terdaftar</p><p className="font-mono font-bold text-emerald-900 bg-white px-3 py-1.5 rounded-lg border border-emerald-100 inline-block">{docData.docId}</p></div>
                    <div><p className="text-[10px] font-black text-emerald-600/60 uppercase tracking-widest mb-1">Diterbitkan Atas Nama</p><p className="font-black text-lg text-emerald-950 uppercase">{docData.nama}</p></div>
                    <div><p className="text-[10px] font-black text-emerald-600/60 uppercase tracking-widest mb-1">Klasifikasi Surat Resmi</p><p className="font-bold text-emerald-800">{docData.jenis}</p></div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }
    
    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all duration-300 font-bold text-sm ${active ? 'bg-emerald-50 text-emerald-800 shadow-md transform translate-x-2' : 'text-emerald-100 hover:bg-emerald-800/50 hover:text-white'}`}>
          {icon} <span className="tracking-wide text-left flex-1">{label}</span>
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
