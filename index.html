<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Eksperimen & Administrasi LPQ</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    /* Transisi standar dan wajar */
    .fade-in { animation: fadeIn 0.2s ease-in-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Scrollbar minimalis standar sistem operasi */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    input, select, textarea { font-size: 14px !important; } 
    
    /* CSS Print yang bersih untuk cetak A4 */
    @media print { 
      @page { size: A4 portrait; margin: 0; } 
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; } 
      aside, header, .mobile-header, button:not(.print-btn) { display: none !important; }
      main { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; overflow: visible !important; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 text-sm font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FAIcon = (faClass) => ({ size = 16, color, className = "" }) => {
      return (
        <span className={`inline-flex items-center justify-center ${className}`} style={{ color: color, width: size, height: size }}>
          <i className={`fa-solid ${faClass}`} style={{ fontSize: size * 0.85 }}></i>
        </span>
      );
    };

    const Upload = FAIcon('fa-upload'); const FileText = FAIcon('fa-file-lines'); const CheckCircle = FAIcon('fa-circle-check');
    const User = FAIcon('fa-user'); const ShieldCheck = FAIcon('fa-shield-halved'); const Users = FAIcon('fa-users');
    const FileSignature = FAIcon('fa-file-signature'); const AlertCircle = FAIcon('fa-circle-exclamation');
    const Timer = FAIcon('fa-stopwatch'); const Download = FAIcon('fa-download'); const BarChart = FAIcon('fa-chart-column');
    const Database = FAIcon('fa-database'); const RefreshCw = FAIcon('fa-arrows-rotate'); const UserCheck = FAIcon('fa-user-check');
    const ClipboardList = FAIcon('fa-clipboard-list'); const BookOpen = FAIcon('fa-book-open'); const LineChart = FAIcon('fa-chart-line');
    const Activity = FAIcon('fa-wave-square'); const X = FAIcon('fa-xmark'); const LogOut = FAIcon('fa-right-from-bracket');
    const PlusCircle = FAIcon('fa-circle-plus'); const Clock = FAIcon('fa-clock'); const QrCode = FAIcon('fa-qrcode');
    const FileSearch = FAIcon('fa-file-code'); const FileCheck = FAIcon('fa-file-circle-check'); const Search = FAIcon('fa-magnifying-glass');
    const Lock = FAIcon('fa-lock'); const MessageSquare = FAIcon('fa-comments'); const MenuIcon = FAIcon('fa-bars'); const Key = FAIcon('fa-key'); const Server = FAIcon('fa-server'); const ArrowLeft = FAIcon('fa-arrow-left');

    function ToastNotification({ toast, setToast }) {
      if (!toast.show) return null;
      const bgStyle = toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 
                      toast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 
                      'bg-sky-50 border-sky-200 text-sky-800';
      const iconColor = toast.type === 'error' ? 'text-red-500' : 
                        toast.type === 'success' ? 'text-emerald-500' : 'text-sky-500';

      return (
        <div className={`fixed bottom-4 right-4 p-4 rounded border shadow-lg z-[100] flex items-start gap-3 w-[calc(100%-2rem)] md:max-w-sm fade-in ${bgStyle}`}>
           <div className={`mt-0.5 shrink-0 ${iconColor}`}>
              {toast.type === 'error' ? <AlertCircle size={16} /> : toast.type === 'success' ? <CheckCircle size={16} /> : <Activity size={16} />}
           </div>
           <p className="flex-1 text-xs md:text-sm font-medium leading-relaxed">{toast.message}</p>
           <button onClick={() => setToast({ show: false, message: '', type: 'info' })} className="text-slate-400 hover:text-slate-600 shrink-0"><X size={14}/></button>
        </div>
      );
    }

    function WelcomeTesterScreen({ setTesterInfo, setRole, showToast }) {
      const [nama, setNama] = useState('');
      const [lembaga, setLembaga] = useState('');
      const [namaKepala, setNamaKepala] = useState(''); 
      const [alamat, setAlamat] = useState('');
      const [nomorIjop, setNomorIjop] = useState('');
      const [nomorStatistik, setNomorStatistik] = useState('');
      const [logo, setLogo] = useState(null);
      const [secretClicks, setSecretClicks] = useState(0);

      const handleLogoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setLogo(reader.result); };
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if(nama.trim() && lembaga.trim() && alamat.trim() && namaKepala.trim()) {
          setTesterInfo({ nama, lembaga, namaKepala, alamat, nomorIjop, nomorStatistik, logo });
        } else showToast("Nama Penguji, Lembaga, Kepala TPQ, dan Alamat wajib diisi.", "error");
      };

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
          <div className="bg-white p-6 md:p-8 rounded border border-slate-200 shadow-sm w-full max-w-lg my-4 fade-in">
            <div className="text-center mb-6">
              <div className="w-14 h-14 bg-slate-100 mx-auto rounded flex items-center justify-center mb-3 border border-slate-200 cursor-default" onClick={() => { const n = secretClicks + 1; if (n >= 7) setRole('admin'); else setSecretClicks(n); }}>
                <ClipboardList className="text-slate-500" size={20} />
              </div>
              <h1 className="text-xl font-bold text-slate-800">Setup Profil Lembaga</h1>
              <p className="text-slate-500 text-xs mt-1 font-medium">Informasi ini otomatis digunakan untuk kop surat resmi.</p>
            </div>
            
            <form onSubmit={handleSubmit} className="space-y-4">
              <div className="space-y-3">
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1">Nama Lengkap Penguji <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: Ahmad Subagyo" className="w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none text-sm transition" value={nama} onChange={(e) => setNama(e.target.value)} />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1">Nama Lembaga (Tanpa TPQ/LPQ) <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: Miftahul Ulum" className="w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none text-sm transition" value={lembaga} onChange={(e) => setLembaga(e.target.value)} />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1">Nama Kepala TPQ <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: K.H. Zainudin" className="w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none text-sm transition" value={namaKepala} onChange={(e) => setNamaKepala(e.target.value)} />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1">Nomor Ijop</label>
                    <input type="text" placeholder="Opsional" className="w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none text-sm transition" value={nomorIjop} onChange={(e) => setNomorIjop(e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-700 mb-1">Nomor Statistik</label>
                    <input type="text" placeholder="Opsional" className="w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none text-sm transition" value={nomorStatistik} onChange={(e) => setNomorStatistik(e.target.value)} />
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1">Alamat Sekretariat Lengkap <span className="text-red-500">*</span></label>
                  <textarea required placeholder="Jalan, RT/RW, Desa, Kec, Kab..." className="w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none resize-none h-20 text-sm transition" value={alamat} onChange={(e) => setAlamat(e.target.value)}></textarea>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-700 mb-1">Logo Lembaga (Opsional)</label>
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 rounded border border-slate-300 bg-slate-50 flex items-center justify-center overflow-hidden shrink-0">
                      {logo ? <img src={logo} className="w-full h-full object-contain bg-white"/> : <Upload className="text-slate-400" size={16} />}
                    </div>
                    <label className="cursor-pointer bg-slate-50 border border-slate-300 hover:bg-slate-100 px-3 py-2 rounded text-xs font-medium text-slate-700 transition">
                      Pilih File Gambar
                      <input type="file" accept="image/*" onChange={handleLogoChange} className="hidden" />
                    </label>
                  </div>
                </div>
              </div>
              <button type="submit" className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-2.5 rounded transition text-sm shadow-sm">
                Masuk ke Aplikasi
              </button>
            </form>
          </div>
        </div>
      );
    }

    function LoginScreen({ setRole, testerInfo }) {
      return (
        <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
          <div className="bg-white p-6 md:p-8 rounded border border-slate-200 shadow-sm w-full max-w-sm text-center fade-in">
            <div className="w-16 h-16 mx-auto rounded border border-slate-200 bg-slate-50 flex items-center justify-center mb-4 overflow-hidden">
              {testerInfo.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain bg-white" /> : <ShieldCheck className="text-emerald-700" size={24} />}
            </div>
            <h1 className="text-lg font-bold text-slate-800 leading-tight">{testerInfo.lembaga}</h1>
            <p className="text-slate-500 text-xs font-semibold mb-6 mt-1">Penguji: {testerInfo.nama}</p>
            
            <div className="space-y-2">
              <button onClick={() => setRole('operator')} className="w-full flex items-center p-3 bg-white border border-slate-200 rounded hover:border-emerald-600 hover:bg-slate-50 transition text-left group">
                <div className="bg-slate-100 group-hover:bg-emerald-50 p-2.5 rounded shrink-0 transition"><User className="text-slate-600 group-hover:text-emerald-700" size={18} /></div>
                <div className="ml-3"><h3 className="font-semibold text-slate-800 text-sm">Staf Operator</h3><p className="text-xs text-slate-500">Eksperimen Entri Data OCR</p></div>
              </button>
              
              <button onClick={() => setRole('kepala')} className="w-full flex items-center p-3 bg-white border border-slate-200 rounded hover:border-emerald-600 hover:bg-slate-50 transition text-left group">
                <div className="bg-slate-100 group-hover:bg-emerald-50 p-2.5 rounded shrink-0 transition"><CheckCircle className="text-slate-600 group-hover:text-emerald-700" size={18} /></div>
                <div className="ml-3"><h3 className="font-semibold text-slate-800 text-sm">Pimpinan LPQ</h3><p className="text-xs text-slate-500">Tanda Tangan & Persetujuan</p></div>
              </button>

              <div className="relative py-3">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                <div className="relative flex justify-center"><span className="bg-white px-3 text-[10px] text-slate-400 font-bold tracking-wider uppercase">Layanan Publik</span></div>
              </div>

              <button onClick={() => setRole('public')} className="w-full flex items-center p-3 bg-slate-50 border border-slate-200 rounded hover:bg-slate-100 transition text-left group">
                <div className="bg-white p-2 rounded border border-slate-200 shrink-0"><QrCode className="text-slate-600" size={16} /></div>
                <div className="ml-3"><h3 className="font-semibold text-slate-700 text-sm">Verifikasi Dokumen</h3><p className="text-xs text-slate-500">Validasi Kode QR Surat</p></div>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function PublicVerificationView({ setRole }) {
      const [docId, setDocId] = useState('');
      const [result, setResult] = useState(null);

      const handleVerify = (e) => {
        e.preventDefault();
        const docs = JSON.parse(localStorage.getItem('GLOBAL_DOCS') || '[]');
        const found = docs.find(d => d.docId === docId && d.status === 'Disetujui');
        setResult(found ? { valid: true, data: found } : { valid: false });
      };

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4 relative">
          <button onClick={() => setRole(null)} className="absolute top-4 left-4 flex items-center gap-2 text-slate-600 hover:text-slate-800 font-semibold bg-white px-3 py-1.5 rounded border border-slate-200 shadow-sm transition">
             <ArrowLeft size={14} /> Kembali
          </button>

          <div className="bg-white p-6 md:p-8 rounded border border-slate-200 shadow-sm w-full max-w-md text-center fade-in">
            <div className="w-14 h-14 bg-slate-100 mx-auto rounded flex items-center justify-center mb-4 border text-slate-600">
               <QrCode size={24} />
            </div>
            <h1 className="text-lg font-bold text-slate-800 mb-1">Verifikasi Dokumen</h1>
            <p className="text-slate-500 text-xs font-medium mb-6">Masukkan ID dokumen di bawah tanda tangan untuk verifikasi.</p>
            
            <form onSubmit={handleVerify} className="space-y-3">
              <input type="text" required placeholder="Contoh: DOC-LPQ-1A2B3C" value={docId} onChange={(e) => setDocId(e.target.value.toUpperCase())} className="w-full text-center font-mono font-bold bg-slate-50 border border-slate-300 p-2.5 rounded focus:border-emerald-600 focus:bg-white outline-none uppercase transition text-sm" />
              <button type="submit" className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-2.5 rounded transition text-sm shadow-sm">Cek Keaslian Dokumen</button>
            </form>

            {result !== null && (
               <div className={`mt-6 p-4 rounded border text-left text-xs fade-in ${result.valid ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                  {result.valid ? (
                      <div className="space-y-3">
                         <div className="flex items-center gap-2 font-bold text-sm text-emerald-900 border-b border-emerald-200/50 pb-2">
                            <CheckCircle size={16} /> <span>DOKUMEN VALID</span>
                         </div>
                         <div className="grid grid-cols-1 gap-2">
                            <div><p className="text-[10px] text-slate-500 font-semibold uppercase">ID Dokumen</p><p className="font-mono font-semibold">{result.data.docId}</p></div>
                            <div><p className="text-[10px] text-slate-500 font-semibold uppercase">Jenis Surat</p><p className="font-medium">{result.data.jenis}</p></div>
                            <div><p className="text-[10px] text-slate-500 font-semibold uppercase">Atas Nama</p><p className="font-semibold">{result.data.nama}</p></div>
                            <div><span className="inline-block text-[10px] bg-emerald-600 text-white px-2 py-0.5 rounded font-bold uppercase mt-1">SAH SECARA ELEKTRONIK</span></div>
                         </div>
                      </div>
                  ) : (
                      <div className="text-center py-2">
                         <X size={24} className="mx-auto mb-2 text-red-500" />
                         <h3 className="font-bold text-red-900 text-sm mb-1">DOKUMEN PALSU ATAU TIDAK ADA</h3>
                         <p className="text-slate-500 font-medium leading-relaxed">ID tersebut tidak terdaftar di sistem. Harap pastikan kembali ejaan karakter kode.</p>
                      </div>
                  )}
               </div>
            )}
          </div>
        </div>
      )
    }

    function AdminDashboardView({ showToast }) {
      const [globalStats, setGlobalStats] = useState({ isLoading: true, totalPenguji: 0, totalEksperimen: 0, avgOcr: 0, avgImport: 0, avgManual: 0 });
      const [isGlobal, setIsGlobal] = useState(false);

      useEffect(() => {
        const fetchGlobalData = async () => {
            try {
                const response = await fetch('/api/gas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_stats' })
                });
                
                if (!response.ok) throw new Error("HTTP Error " + response.status);
                const result = await response.json();
                
                if (result.status === 'success') {
                    if (!result?.data) throw new Error("Sistem belum di-Deploy.");
                    setGlobalStats({ 
                        isLoading: false, 
                        totalPenguji: result.data.totalPenguji, 
                        totalEksperimen: result.data.totalEksperimen, 
                        avgOcr: result.data.avgOcr, 
                        avgImport: result.data.avgImport || 0, 
                        avgManual: result.data.avgManual 
                    });
                    setIsGlobal(true);
                    return; 
                } else {
                    throw new Error(result.error || "Gagal sinkron server.");
                }
            } catch (error) {
                console.warn("Spreadsheet offline, menggunakan database lokal:", error);
            }

            const logs = JSON.parse(localStorage.getItem('GLOBAL_RESEARCH_LOGS') || '[]');
            const uniqueTesters = new Set(logs.map(l => l.tester)).size;
            const ocrLogs = logs.filter(l => l.method === 'OCR Gemini AI');
            const importLogs = logs.filter(l => l.method === 'Import Excel/CSV');
            const manLogs = logs.filter(l => l.method === 'Manual');
            
            const avgOcr = ocrLogs.length ? (ocrLogs.reduce((a, b) => a + b.duration, 0) / ocrLogs.length).toFixed(1) : 0;
            const avgImport = importLogs.length ? (importLogs.reduce((a, b) => a + b.duration, 0) / importLogs.length).toFixed(1) : 0;
            const avgM = manLogs.length ? (manLogs.reduce((a, b) => a + b.duration, 0) / manLogs.length).toFixed(1) : 0;

            setGlobalStats({ isLoading: false, totalPenguji: uniqueTesters || 0, totalEksperimen: logs.length || 0, avgOcr: avgOcr, avgImport: avgImport, avgManual: avgM });
            setIsGlobal(false);
        };
        
        fetchGlobalData();
      }, []);

      return (
        <div className="space-y-5 fade-in pb-10">
          <header className="flex flex-col md:flex-row md:items-end justify-between gap-2 border-b border-slate-200 pb-3">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Dashboard Riset</h2>
              <p className="text-xs text-slate-500 font-medium mt-0.5">Analisis kecepatan entri metode input konvensional vs kecerdasan buatan.</p>
            </div>
            {globalStats.isLoading ? (
               <span className="bg-slate-100 border border-slate-200 text-slate-600 px-3 py-1 rounded text-xs font-semibold flex items-center gap-1.5"><RefreshCw size={12} className="animate-spin"/> Menghubungkan...</span>
            ) : isGlobal ? (
               <span className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-3 py-1 rounded text-xs font-semibold flex items-center gap-1.5"><Server size={12}/> Sinkronisasi Global</span>
            ) : (
               <span className="bg-amber-50 border border-amber-200 text-amber-700 px-3 py-1 rounded text-xs font-semibold flex items-center gap-1.5"><Database size={12}/> Mode Data Lokal</span>
            )}
          </header>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm">
              <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Partisipan Akun</p>
              <p className="text-2xl font-bold text-slate-800">{globalStats.totalPenguji}</p>
            </div>

            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm">
              <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Total Eksperimen</p>
              <p className="text-2xl font-bold text-slate-800">{globalStats.totalEksperimen}</p>
            </div>

            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm">
              <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-wider mb-1">Rata-rata OCR AI</p>
              <p className="text-2xl font-bold text-emerald-700">{globalStats.avgOcr}<span className="text-xs ml-1 text-slate-400 font-medium">detik</span></p>
            </div>

            <div className="bg-white p-4 rounded border border-slate-200 shadow-sm">
              <p className="text-[10px] font-bold text-amber-600 uppercase tracking-wider mb-1">Rata-rata Manual</p>
              <p className="text-2xl font-bold text-amber-700">{globalStats.avgManual}<span className="text-xs ml-1 text-slate-400 font-medium">detik</span></p>
            </div>
          </div>
          
          <div className="bg-white rounded border border-slate-200 shadow-sm overflow-hidden">
             <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 font-semibold text-slate-700 text-xs md:text-sm flex items-center gap-2">
                <LineChart size={14} className="text-slate-500" /> Komparasi Visual Waktu Eksekusi
             </div>
             <div className="p-6 flex flex-col items-center justify-center min-h-[180px]">
                {globalStats.avgOcr > 0 || globalStats.avgManual > 0 ? (
                   <div className="w-full max-w-xl space-y-4 text-xs">
                      {globalStats.avgOcr > 0 && (
                        <div>
                           <div className="flex justify-between font-semibold text-emerald-800 mb-1"><span>Asisten AI Gemini OCR</span><span>{globalStats.avgOcr} detik</span></div>
                           <div className="w-full bg-slate-100 border border-slate-200 rounded h-3 overflow-hidden"><div className="bg-emerald-600 h-full transition-all" style={{ width: `${(globalStats.avgOcr / Math.max(globalStats.avgOcr, globalStats.avgManual)) * 100}%` }}></div></div>
                        </div>
                      )}
                      {globalStats.avgManual > 0 && (
                        <div>
                           <div className="flex justify-between font-semibold text-slate-800 mb-1"><span>Ketik Manual (Konvensional)</span><span>{globalStats.avgManual} detik</span></div>

    function AddressCascader({ formData, setFormData, prefix = '' }) {
        const getField = (field) => prefix ? `${prefix}${field.charAt(0).toUpperCase() + field.slice(1)}` : field;

        const [regencies, setRegencies] = useState([]);

        useEffect(() => {
            fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json')
                .then(res => res.json())
                .then(setProvinces).catch(console.error);
        }, []);

        const handleChange = (e, level) => {
            const name = e.target.value;
            const id = e.target.selectedOptions?.[0]?.dataset?.id;
            
            if (level === 'provinsi') {
                setFormData(prev => ({ ...prev, [getField('provinsi')]: name, [getField('kabupaten')]: '', [getField('kecamatan')]: '', [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${id}.json`).then(r => r.json()).then(setRegencies);
                else setRegencies([]); setDistricts([]); setVillages([]);
            } else if (level === 'kabupaten') {
                setFormData(prev => ({ ...prev, [getField('kabupaten')]: name, [getField('kecamatan')]: '', [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`).then(r => r.json()).then(setDistricts);
                else setDistricts([]); setVillages([]);
            } else if (level === 'kecamatan') {
                setFormData(prev => ({ ...prev, [getField('kecamatan')]: name, [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/villages/${id}.json`).then(r => r.json()).then(setVillages);
                else setVillages([]);
            } else if (level === 'desa') {
                setFormData(prev => ({ ...prev, [getField('desa')]: name }));
            } else {
                setFormData(prev => ({ ...prev, [getField(level)]: name }));
            }
        };

        const fieldClass = "w-full bg-white border border-slate-300 px-3 py-2 rounded focus:border-emerald-600 focus:outline-none text-xs disabled:bg-slate-100 disabled:text-slate-500 transition";

        return (

                    <option value="">-- Pilih Kecamatan --</option>

      }, [isTimerRunning, isProcessingGas]);

      const handleStartExperiment = () => {

      };

      const cancelExperiment = () => {
        setIsTimerRunning(false); setTimeElapsed(0); setOcrStep(initialStep); setRawFile(null); setFilePreview(null); setFormData(emptyForm); setTempNik('');
      };

      const handleFileChange = (e) => { 
        if (e.target.files[0]) {
          setRawFile(e.target.files[0]);
          if(e.target.files[0].type.includes('image')) {
            setFilePreview(URL.createObjectURL(e.target.files[0]));

      const handleNikSubmit = (e) => {
          e.preventDefault();
          if(!tempNik) return showToast("Masukkan NIK terlebih dahulu", "error");
          setFormData(prev => ({...prev, nik: tempNik}));
          setOcrStep('UPLOAD_KK');
      };

      const processImageForOCR = async (file) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                  const img = new Image();
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      const MAX_DIM = 1024; 
                      let w = img.width; let h = img.height;
                      
                      if (w > MAX_DIM || h > MAX_DIM) {
                          if (w > h) { h = (h/w)*MAX_DIM; w = MAX_DIM; }
                          else { w = (w/h)*MAX_DIM; h = MAX_DIM; }
                      }
                      
                      canvas.width = w; canvas.height = h;
                      const ctx = canvas.getContext('2d');
                      ctx.drawImage(img, 0, 0, w, h);
                      
                      const base64Str = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                      resolve({ mimeType: 'image/jpeg', data: base64Str });
                  };
                  img.onerror = () => reject(new Error("Gagal memuat berkas gambar"));
                  img.src = e.target.result;
              };
              reader.onerror = () => reject(new Error("Gagal membaca file berkas"));
              reader.readAsDataURL(file);
          });
      };

      const fetchWithRetry = async (url, options, retries = 3) => {
        const delays = [1000, 2000, 4000];
        for (let i = 0; i < retries; i++) {
            try {

            }
        }

    function KuisionerView({ testerInfo, showToast }) {
      const [submitted, setSubmitted] = useState(false);
      const [isSending, setIsSending] = useState(false);
      
      const [a1, setA1] = useState(''); const [a2, setA2] = useState(''); const [a3, setA3] = useState('');
      const [b1, setB1] = useState(''); const [b2, setB2] = useState(''); const [b3, setB3] = useState('');
      const [c1, setC1] = useState(''); const [c2, setC2] = useState(''); const [c3, setC3] = useState('');
      const [d1, setD1] = useState(''); const [d2, setD2] = useState(''); const [d3, setD3] = useState('');
      const [e1, setE1] = useState(''); const [e2, setE2] = useState(''); const [e3, setE3] = useState('');
      
      const [kendala, setKendala] = useState('');
      const [saran, setSaran] = useState('');

      const handleSubmit = async (e) => {
          e.preventDefault();
          if(!a1 || !a2 || !a3 || !b1 || !b2 || !b3 || !c1 || !c2 || !c3 || !d1 || !d2 || !d3 || !e1 || !e2 || !e3) return showToast("Mohon isi semua pertanyaan skala Likert.", "error");
          setIsSending(true);
          
          const payload = {
              action: 'submit_kuisioner',
              sheetName: 'Kuisioner', 
              testerNama: testerInfo.nama,
              testerLembaga: testerInfo.lembaga,
              a1, a2, a3, b1, b2, b3, c1, c2, c3, d1, d2, d3, e1, e2, e3,
              kendala: kendala,
              saran: saran,
              timestamp: new Date().toLocaleString('id-ID')
          };

          try {
              await fetch('/api/gas', {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify(payload)
              });
              setSubmitted(true);
              showToast("Evaluasi Likert berhasil terkirim.", "success");
          } catch(err) {
              console.error("Gagal mengirim kuisioner", err);
              showToast("Koneksi gagal saat mengirim data kuisioner.", "error");
          } finally {
              setIsSending(false);
          }
      };

      if (submitted) {
          return (
              <div className="bg-white p-6 md:p-10 rounded border border-slate-200 shadow-sm text-center animate-fade-in max-w-xl mx-auto mt-6">
                  <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">

                  <p className="text-xs text-slate-500 leading-relaxed max-w-sm mx-auto font-medium">
                      Data evaluasi secara otomatis terekam dan disimpan sebagai basis analisis laporan riset Anda.
                  </p>
              </div>
          );
      }

      return (
          <div className="max-w-4xl mx-auto fade-in pb-10">
              <header className="mb-4 border-b pb-3">
                  <h2 className="text-xl font-bold text-slate-800">Kuesioner Evaluasi Sistem</h2>
                  <p className="text-xs text-slate-500 mt-0.5 font-medium leading-relaxed">
                      Lengkapi kuesioner skala Likert untuk pengumpulan data riset kepuasan pengguna.
                  </p>
              </header>

              <form onSubmit={handleSubmit} className="space-y-4">
                  <SectionHeader title="A. Variabel Efisiensi (Waktu & Tenaga)" desc="Menilai pengaruh pemrosesan AI terhadap beban operasional tata usaha." />
                  <LikertQuestion number="A1" title="Efisiensi Entri" statement="Penggunaan OCR Gemini AI mempercepat proses entri data santri dan ustadz secara signifikan dibandingkan mengetik manual." name="a1" value={a1} onChange={setA1} />
                  <LikertQuestion number="A2" title="Waktu Pemrosesan" statement="Waktu pemrosesan data (waktu tunggu) dari AI untuk mengekstrak teks dirasa sangat cepat dan tidak mengganggu alur kerja." name="a2" value={a2} onChange={setA2} />
                  <LikertQuestion number="A3" title="Beban Kerja" statement="Secara keseluruhan, sistem ini berhasil mengurangi beban kerja administratif saya sehari-hari." name="a3" value={a3} onChange={setA3} />

                  <SectionHeader title="B. Variabel Akurasi (Efektivitas OCR AI)" desc="Mengukur ketepatan interpretasi teks dari dokumen digital." />
                  <LikertQuestion number="B1" title="Tingkat Akurasi" statement="Tingkat akurasi ekstraksi teks dari gambar (KTP/KK) oleh sistem OCR AI sudah sangat baik dan presisi." name="b1" value={b1} onChange={setB1} />
                  <LikertQuestion number="B2" title="Minim Revisi" statement="Data yang dihasilkan oleh AI jarang memerlukan perbaikan atau revisi ketik secara manual." name="b2" value={b2} onChange={setB2} />
                  <LikertQuestion number="B3" title="Pemetaan Data" statement="Sistem mampu menempatkan data hasil ekstraksi ke dalam kolom formulir yang tepat (misal: NIK masuk ke NIK, Nama ke Nama)." name="b3" value={b3} onChange={setB3} />

                  <SectionHeader title="C. Variabel Usability (Kemudahan Penggunaan)" desc="Menganalisis penerimaan antarmuka perangkat lunak oleh pengguna." />
                  <LikertQuestion number="C1" title="Desain Antarmuka" statement="Antarmuka (User Interface) sistem ini dirancang dengan rapi, bersih, dan memanjakan mata." name="c1" value={c1} onChange={setC1} />
                  <LikertQuestion number="C2" title="Kemudahan Fitur" statement="Fitur dan tombol pada aplikasi mudah dipahami tanpa memerlukan buku panduan atau pelatihan teknis yang rumit." name="c2" value={c2} onChange={setC2} />
                  <LikertQuestion number="C3" title="Navigasi Menu" statement="Navigasi antar menu (seperti berpindah dari entri data ke arsip dokumen) berjalan lancar dan logis." name="c3" value={c3} onChange={setC3} />

                  <SectionHeader title="D. Variabel Fungsionalitas Administrasi" desc="Menguji kesesuaian sistem dengan administrasi kelembagaan." />
                  <LikertQuestion number="D1" title="Otomatisasi Dokumen" statement="Fitur pembuatan dokumen resmi (seperti Surat Tugas) secara otomatis sangat membantu dan sesuai standar lembaga." name="d1" value={d1} onChange={setD1} />
                  <LikertQuestion number="D2" title="Arsip Digital" statement="Sistem arsip terdigitalisasi memudahkan saya dalam mencari kembali dokumen yang telah diterbitkan di masa lalu." name="d2" value={d2} onChange={setD2} />
                  <LikertQuestion number="D3" title="Format Form Geografis" statement="Pengisian form yang otomatis mendeteksi alamat (Provinsi hingga Desa) sangat membantu standarisasi format alamat." name="d3" value={d3} onChange={setD3} />

                  <SectionHeader title="E. Variabel Otorisasi & TTE" desc="Keamanan dan efisiensi legalisasi dokumen digital." />
                  <LikertQuestion number="E1" title="Kecepatan Otorisasi" statement="Penggunaan QR Code sebagai Tanda Tangan Elektronik (TTE) sangat mempercepat proses otorisasi dokumen oleh pimpinan." name="e1" value={e1} onChange={setE1} />
                  <LikertQuestion number="E2" title="Kepercayaan Sistem" statement="Saya merasa yakin bahwa penerapan QR Code ini dapat diandalkan dan sulit untuk dipalsukan (memiliki validitas yang baik)." name="e2" value={e2} onChange={setE2} />
                  <LikertQuestion number="E3" title="Pelacakan Dokumen" statement="Alur persetujuan dari status 'Pending' hingga 'Disetujui' memudahkan pelacakan status dokumen." name="e3" value={e3} onChange={setE3} />
                  
                  <div className="space-y-3 pt-4 border-t border-slate-200">
                      <h3 className="font-bold text-sm text-slate-800">F. Umpan Balik Kualitatif</h3>
                      <div className="space-y-1">
                          <label className="font-semibold text-slate-700 text-xs block">Apa kendala operasional utama yang Anda rasakan selama simulasi?</label>
                          <textarea value={kendala} onChange={(e) => setKendala(e.target.value)} className="w-full bg-white border border-slate-300 p-2.5 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none transition resize-none h-20 text-xs" placeholder="Tulis tanggapan Anda..."></textarea>
                      </div>
                      <div className="space-y-1">
                          <label className="font-semibold text-slate-700 text-xs block">Apa fitur pelengkap yang paling dibutuhkan untuk menunjang kebutuhan ke depan?</label>
                          <textarea value={saran} onChange={(e) => setSaran(e.target.value)} className="w-full bg-white border border-slate-300 p-2.5 rounded focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 outline-none transition resize-none h-20 text-xs" placeholder="Tulis saran tambahan Anda..."></textarea>
                      </div>
                  </div>

                  <button type="submit" disabled={isSending} className="w-full flex items-center justify-center gap-1.5 bg-slate-800 hover:bg-slate-900 text-white py-2.5 rounded font-semibold transition text-xs shadow disabled:opacity-75 mt-4">
                      {isSending ? <RefreshCw className="animate-spin" size={14}/> : <Database size={14}/>}
                      {isSending ? "Mengirim Data..." : "Kirim Tanggapan Kuesioner"}
                  </button>
              </form>
          </div>
      );

                <span className="font-mono text-xs font-bold flex items-center gap-1.5"><ClipboardList size={14}/> Pratinjau Lembar Surat A4</span>
                <div className="flex gap-2 w-full md:w-auto">
                  <button onClick={() => window.print()} className="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-1.5 rounded text-xs flex items-center justify-center gap-1.5 transition"><Download size={12}/> Cetak PDF</button>
                  <button onClick={() => setSelectedDoc(null)} className="flex-1 md:flex-none bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded text-xs font-bold transition">Tutup</button>
                </div>
              </div>
              
              <div className="w-full overflow-x-auto p-4 md:p-8 bg-slate-200 print:p-0 print:bg-white custom-scrollbar flex justify-center">
                <div className="bg-white text-black shadow-lg print:shadow-none shrink-0" style={{ width: '210mm', minHeight: '297mm', padding: '20mm' }}>
                  <div className="flex flex-col mb-8">
                    <div className="flex items-center justify-between mb-2">
                      <div className="w-[90px] h-[90px] flex items-center justify-center shrink-0">
                        {testerInfo?.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain" /> : <div className="w-16 h-16 border border-gray-300 border-dashed rounded flex items-center justify-center text-gray-400 font-bold text-[10px]">LOGO</div>}
                      </div>
                      <div className="flex-1 text-center px-4">
                        <h1 style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: "14pt", fontWeight: "bold", textTransform: "uppercase", marginBottom: "2px" }}>TAMAN PENDIDIKAN AL QURAN</h1>
                        <h2 style={{ fontFamily: "'Bookman Old Style', serif", fontSize: "16pt", fontWeight: "bold", marginBottom: "2px" }}>{testerInfo?.lembaga || '(Nama Lembaga)'}</h2>
                        <p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: "10pt" }}>Nomor Izin Operasional: {testerInfo?.nomorIjop || '-'} <br/> NSDT : {testerInfo?.nomorStatistik || '-'}</p>
                      </div>
                      <div className="w-[90px] h-[90px] shrink-0 opacity-0 pointer-events-none"></div>
                    </div>
                    <div className="bg-black w-full py-1 px-4 text-center mb-1"><p style={{ fontFamily: "'Times New Roman', Times, serif", fontSize: "9pt", color: "white", margin: 0 }}>Sekretariat : {testerInfo?.alamat}</p></div>
                    <div className="border-b-[3px] border-black w-full mb-1"></div><div className="border-b border-black w-full"></div>
                  </div>
                  
                  <h3 className="text-lg font-bold underline mb-8 uppercase tracking-widest text-center mt-6" style={{ fontFamily: "'Times New Roman', Times, serif" }}>{selectedDoc.jenis}</h3>
                  <p className="text-left mb-6 text-sm leading-relaxed">Yang bertanda tangan di bawah ini, Kepala {testerInfo?.lembaga || 'Lembaga Pendidikan Al-Quran'}, menerangkan dengan sesungguhnya bahwa:</p>
                  
                  <table className="text-left mb-8 mx-auto w-11/12 text-sm leading-loose">
                    <tbody>
                      <tr><td className="py-2 w-1/3 font-semibold align-top">Nama Lengkap</td><td className="py-2 px-2 align-top">:</td><td className="py-2 font-bold uppercase">{selectedDoc.nama}</td></tr>
                      <tr><td className="py-2 font-semibold align-top">Tempat, Tgl Lahir</td><td className="py-2 px-2 align-top">:</td><td className="py-2 capitalize">{selectedDoc.ttl}</td></tr>
                      <tr><td className="py-2 font-semibold align-top">Alamat Domisili</td><td className="py-2 px-2 align-top">:</td><td className="py-2 leading-relaxed capitalize">{selectedDoc.alamat}</td></tr>
                    </tbody>
                  </table>
                  
                  <p className="text-left mb-16 text-sm leading-relaxed text-justify">Adalah benar yang bersangkutan merupakan tenaga pendidik/staf yang aktif di lembaga kami. Demikian dokumen administrasi fungsional ini dibuat secara sah melalui sistem terpadu untuk dapat dipergunakan sebagaimana mestinya.</p>
                  
                  <div className="flex justify-end pr-4">
                    <div className="text-center">
                      <p className="mb-2 text-sm">{testerInfo?.alamat?.split(',')[0] || 'Kota'}, {new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                      <p className="mb-4 text-sm font-bold">Kepala Lembaga,</p>
                      <div className="relative inline-block border-2 border-emerald-900 p-1 rounded mb-2 bg-white">
                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${selectedDoc.docId}`} alt="QR Code TTE" className="w-24 h-24 mix-blend-multiply" />
                        <div className="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-white px-2 py-0.5 text-[9px] font-bold text-emerald-900 border border-emerald-900 rounded-full whitespace-nowrap">TTE SAH</div>
                      </div>
                      <p className="text-sm font-bold underline underline-offset-4 uppercase">{testerInfo?.namaKepala || '..........................'}</p>
                      <p className="text-[10px] font-mono font-bold text-slate-800 bg-slate-100 py-1 px-3 rounded border border-slate-300 w-max mx-auto mt-2">ID: {selectedDoc.docId}</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SidebarItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded transition font-semibold text-xs ${active ? 'bg-emerald-800 text-white shadow' : 'text-emerald-100 hover:bg-emerald-900 hover:text-white'}`}>
          <div className="shrink-0">{icon}</div> <span className="tracking-wide text-left flex-1 truncate">{label}</span>
        </button>
      );
    }

    function App() {
      const [testerInfo, setTesterInfo] = useState(null);
      const [currentRole, setCurrentRole] = useState(null); 
      
      const [santriData, setSantriData] = useState([]);
      const [ustadzData, setUstadzData] = useState([]);
      const [dokumenReq, setDokumenReq] = useState(() => JSON.parse(localStorage.getItem('GLOBAL_DOCS') || '[]'));
      const [researchLogs, setResearchLogs] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      useEffect(() => {
          localStorage.setItem('GLOBAL_DOCS', JSON.stringify(dokumenReq));
      }, [dokumenReq]);

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setIsMobileMenuOpen(false);
      };

      if (!testerInfo && currentRole !== 'admin' && currentRole !== 'public') {
        return (
          <React.Fragment>
            <WelcomeTesterScreen setTesterInfo={setTesterInfo} setRole={setCurrentRole} showToast={showToast} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }

      if (!currentRole) {
        return (
          <React.Fragment>
            <LoginScreen setRole={setCurrentRole} testerInfo={testerInfo} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }
      
      if (currentRole === 'public') {
         return (
             <React.Fragment>
                <PublicVerificationView setRole={setCurrentRole} />
                <ToastNotification toast={toast} setToast={setToast} />
             </React.Fragment>
         )
      }
      
      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-[#F1F5F9]">
          {/* Mobile Header */}
          <div className="md:hidden bg-emerald-950 text-white p-4 flex justify-between items-center shadow-md relative z-40 mobile-header">
             <div className="flex items-center gap-2">
               <div className="bg-white p-1 rounded w-8 h-8 flex justify-center items-center overflow-hidden shrink-0">
                   {currentRole === 'admin' ? <Activity color="#022c22" size={16} /> : testerInfo?.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain" /> : <FileSignature color="#022c22" size={16} />}
               </div>
               <div className="overflow-hidden">
                  <h1 className="font-bold text-xs truncate">{currentRole === 'admin' ? 'Pusat Analisis' : (testerInfo?.lembaga || 'Panel LPQ')}</h1>
                  <p className="text-emerald-400 text-[9px] uppercase font-bold tracking-wider">{currentRole}</p>
               </div>
             </div>
             <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-1.5 bg-emerald-900 rounded focus:outline-none">
                {isMobileMenuOpen ? <X size={16}/> : <MenuIcon size={16}/>}
             </button>
          </div>

          {isMobileMenuOpen && (
              <div className="fixed inset-0 bg-black/50 z-40 md:hidden transition" onClick={() => setIsMobileMenuOpen(false)}></div>
          )}

          {/* Sidebar */}
          <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-200 fixed md:sticky top-0 left-0 h-screen w-[240px] bg-emerald-950 text-white flex flex-col z-50 print:hidden overflow-hidden shrink-0 shadow-md`}>
            <div className="p-5 text-center border-b border-emerald-900 relative z-10 hidden md:block">
              <div className="bg-white p-1.5 rounded w-16 h-16 mx-auto mb-3 flex items-center justify-center shadow overflow-hidden">
                {currentRole === 'admin' ? <Activity color="#022c22" size={32} /> : testerInfo?.logo ? <img src={testerInfo.logo} alt="Logo" className="w-full h-full object-contain" /> : <FileSignature color="#022c22" size={32} />}
              </div>
              <h1 className="font-bold text-sm leading-snug truncate text-emerald-50">{currentRole === 'admin' ? 'Pusat Statistik' : (testerInfo?.lembaga || 'SIAKAD Portal')}</h1>
              <p className="text-emerald-400 text-[10px] mt-1 font-semibold tracking-wider uppercase">{currentRole === 'admin' ? 'Dashboard Utama' : 'Prototype System'}</p>
            </div>
            
            <nav className="flex-1 p-3 space-y-1 overflow-y-auto relative z-10 custom-scrollbar">
              {currentRole === 'admin' && (
                <SidebarItem icon={<LineChart />} label="Dashboard Statistik" active={activeTab === 'admin-dashboard'} onClick={() => handleTabChange('admin-dashboard')} />
              )}
              {currentRole === 'operator' && (
                <React.Fragment>
                  <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1.5 mt-3 px-3">Modul Pengukuran</p>
                  <SidebarItem icon={<Users />} label="Entri Data Santri" active={activeTab === 'ocr-santri'} onClick={() => handleTabChange('ocr-santri')} />
                  <SidebarItem icon={<UserCheck />} label="Entri Data Ustadz" active={activeTab === 'ocr-ustadz'} onClick={() => handleTabChange('ocr-ustadz')} />
                  <SidebarItem icon={<BarChart />} label="Catatan Hasil Log" active={activeTab === 'report'} onClick={() => handleTabChange('report')} />
                  
                  <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1.5 mt-4 px-3">Layanan Publik</p>
                  <SidebarItem icon={<FileText />} label="Pembuatan Surat" active={activeTab === 'request'} onClick={() => handleTabChange('request')} />
                  <SidebarItem icon={<FileCheck />} label="Arsip & Cetak Berkas" active={activeTab === 'arsip'} onClick={() => handleTabChange('arsip')} />
                  
                  <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1.5 mt-4 px-3">Evaluasi Riset</p>
                  <SidebarItem icon={<MessageSquare />} label="Kuesioner Likert" active={activeTab === 'kuisioner'} onClick={() => handleTabChange('kuisioner')} />
                </React.Fragment>
              )}
              {currentRole === 'kepala' && (
                <React.Fragment>
                  <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1.5 mt-3 px-3">Otorisasi Surat</p>
                  <SidebarItem icon={<ShieldCheck />} label="Persetujuan Dokumen" active={activeTab === 'approval'} onClick={() => handleTabChange('approval')} />
                  <SidebarItem icon={<FileCheck />} label="Arsip Berkas Sah" active={activeTab === 'arsip'} onClick={() => handleTabChange('arsip')} />
                </React.Fragment>
              )}
            </nav>

            <div className="p-4 bg-emerald-990 relative z-10 border-t border-emerald-900 pb-6">
              <div className="flex items-center gap-2.5 mb-3 px-1">
                <div className="bg-emerald-900 rounded p-1.5 border border-emerald-800"><User size={14} className="text-emerald-300" /></div>
                <div className="overflow-hidden">
                  <p className="font-bold text-xs capitalize truncate text-emerald-50">{currentRole === 'admin' ? 'Administrator' : testerInfo?.nama}</p>
                  <p className="text-[9px] font-semibold uppercase tracking-wider text-emerald-400 truncate">Sesi Aktif ({currentRole})</p>
                </div>
              </div>
              <div className="flex flex-col gap-1.5">
                  <button onClick={() => { setCurrentRole(null); setActiveTab('dashboard'); }} className="w-full flex items-center justify-center gap-1.5 bg-emerald-800 hover:bg-emerald-700 text-white py-2 rounded transition font-bold text-xs border border-emerald-700">
                    <RefreshCw size={12} /> {currentRole === 'admin' ? 'Kembali' : 'Ganti Akses Peran'}
                  </button>
                  {currentRole !== 'admin' && (
                      <button onClick={() => { setTesterInfo(null); setCurrentRole(null); setActiveTab('dashboard'); }} className="w-full flex items-center justify-center gap-1 bg-transparent text-emerald-400 hover:text-red-400 py-1 transition font-semibold text-[10px]">
                        <LogOut size={10} /> Reset Setup Lembaga
                      </button>
                  )}
              </div>
            </div>
          </aside>

          {/* Main Workspace */}
          <main className="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto print:p-0 print:m-0 print:bg-white relative w-full">
            {activeTab === 'admin-dashboard' && <AdminDashboardView showToast={showToast} />}
            {activeTab === 'ocr-santri' && <ExperimentEntryView targetType="santri" targetData={santriData} setTargetData={setSantriData} researchLogs={researchLogs} setResearchLogs={setResearchLogs} testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'ocr-ustadz' && <ExperimentEntryView targetType="ustadz" targetData={ustadzData} setTargetData={setUstadzData} researchLogs={researchLogs} setResearchLogs={setResearchLogs} testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'report' && <ResearchReportView researchLogs={researchLogs} showToast={showToast} />}
            {activeTab === 'kuisioner' && <KuisionerView testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'request' && <RequestDocumentView ustadzData={ustadzData} dokumenReq={dokumenReq} setDokumenReq={setDokumenReq} showToast={showToast} />}
            {activeTab === 'approval' && <ApprovalView dokumenReq={dokumenReq} setDokumenReq={setDokumenReq} showToast={showToast} />}
            {activeTab === 'arsip' && <ArsipView dokumenReq={dokumenReq} testerInfo={testerInfo} />}
            
            {activeTab === 'dashboard' && (
              <div className="flex flex-col items-center justify-center min-h-[60vh] text-center max-w-lg mx-auto px-2 fade-in">
                <div className="bg-white p-4 rounded border border-slate-200 mb-4 shadow-sm text-slate-500">
                  {currentRole === 'admin' ? <LineChart size={36} className="text-emerald-700" /> : <BookOpen size={36} className="text-emerald-700" />}
                </div>
                <h2 className="text-lg font-bold text-slate-800 mb-1">Portal Eksperimen SIAKAD LPQ</h2>
                <p className="text-xs text-slate-500 leading-relaxed font-medium">
                  Selamat datang di instrumen pengisian data berbasis otomatisasi AI. Gunakan menu navigasi sebelah kiri untuk menguji efektivitas operasional tata usaha.
                </p>
                <div className="mt-6 flex flex-wrap justify-center gap-2">
                    <span className="px-3 py-1 bg-white border rounded shadow-xs text-[10px] font-bold text-slate-600 flex items-center gap-1"><ShieldCheck size={12} className="text-emerald-600"/> Keamanan Terjamin</span>
                    <span className="px-3 py-1 bg-white border rounded shadow-xs text-[10px] font-bold text-slate-600 flex items-center gap-1"><Timer size={12} className="text-emerald-600"/> Analisis Waktu Real-time</span>
                    <span className="px-3 py-1 bg-white border rounded shadow-xs text-[10px] font-bold text-slate-600 flex items-center gap-1"><Database size={12} className="text-emerald-600"/> Didukung Gemini AI</span>
                </div>
              </div>
            )}
          </main>

          <ToastNotification toast={toast} setToast={setToast} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
