      const [activeTab, setActiveTab] = useState('dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 5000);
      };

      useEffect(() => {
          localStorage.setItem('GLOBAL_DOCS', JSON.stringify(dokumenReq));
      }, [dokumenReq]);

      const isKuisionerUnlocked = true;

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setIsMobileMenuOpen(false);
      };

      if (!testerInfo && currentRole !== 'admin' && currentRole !== 'public') {
        return (
          <React.Fragment>
            <WelcomeTesterScreen setTesterInfo={setTesterInfo} setRole={setCurrentRole} showToast={showToast} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }

      if (!currentRole) {
        return (
          <React.Fragment>
            <LoginScreen setRole={setCurrentRole} testerInfo={testerInfo} />
            <ToastNotification toast={toast} setToast={setToast} />
          </React.Fragment>
        );
      }
      
      if (currentRole === 'public') {
         return (
             <React.Fragment>
                <PublicVerificationView setRole={setCurrentRole} />
                <ToastNotification toast={toast} setToast={setToast} />
             </React.Fragment>
         )
      }
      
      return (
        <div className="min-h-screen flex flex-col md:flex-row font-sans bg-[#F8FAFC]">
          <div className="md:hidden bg-emerald-900 text-white p-4 flex justify-between items-center shadow-md relative z-40 mobile-header">
             <div className="flex items-center gap-3">
               <div className="bg-white p-1 rounded-lg w-8 h-8 flex justify-center items-center overflow-hidden">
                   {currentRole === 'admin' ? <Activity color="#064e3b" size={20} /> : testerInfo?.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain" /> : <FileSignature color="#064e3b" size={20} />}
               </div>
               <div>
                  <h1 className="font-bold text-sm leading-tight line-clamp-1">{currentRole === 'admin' ? 'Pusat Riset' : (testerInfo?.lembaga || 'Portal Riset')}</h1>
                  <p className="text-emerald-400 text-[10px] uppercase font-bold tracking-widest">{currentRole}</p>
               </div>
             </div>
             <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-emerald-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                {isMobileMenuOpen ? <X size={20}/> : <MenuIcon size={20}/>}
             </button>
          </div>

          {isMobileMenuOpen && (
              <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm transition-opacity" onClick={() => setIsMobileMenuOpen(false)}></div>
          )}

          <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 fixed md:sticky top-0 left-0 h-[100dvh] w-[280px] md:w-72 bg-emerald-900 text-white flex flex-col shadow-2xl z-50 print:hidden overflow-hidden`}>
            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-800 rounded-full blur-3xl opacity-50 -translate-y-10 translate-x-10 pointer-events-none"></div>
            
            <div className="p-6 md:p-8 text-center border-b border-emerald-800 relative z-10 hidden md:block">
              <div className="bg-white p-2 rounded-2xl w-24 h-24 mx-auto mb-4 flex items-center justify-center shadow-lg overflow-hidden border-2 border-emerald-100">
                {currentRole === 'admin' ? <Activity color="#064e3b" size={48} /> : testerInfo?.logo ? <img src={testerInfo.logo} alt="Logo" className="w-full h-full object-contain" /> : <FileSignature color="#064e3b" size={48} />}
              </div>
              <h1 className="font-bold text-xl leading-tight line-clamp-2 tracking-wide text-emerald-50">{currentRole === 'admin' ? 'Pusat Riset Bab 4' : (testerInfo?.lembaga || 'Portal Riset')}</h1>
              <p className="text-emerald-400 text-xs mt-2 px-2 uppercase font-semibold tracking-widest">{currentRole === 'admin' ? 'Dashboard Peneliti' : 'SIAKAD Prototype'}</p>
            </div>
            
            <nav className="flex-1 p-4 space-y-1 overflow-y-auto relative z-10 custom-scrollbar">
              {currentRole === 'admin' && (
                <SidebarItem icon={<LineChart />} label="Dashboard Statistik" active={activeTab === 'admin-dashboard'} onClick={() => handleTabChange('admin-dashboard')} />
              )}
              {currentRole === 'operator' && (
                <React.Fragment>
                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-4 px-3">Eksperimen Waktu</p>
                  <SidebarItem icon={<Users />} label="Simulasi Entri Santri" active={activeTab === 'ocr-santri'} onClick={() => handleTabChange('ocr-santri')} />
                  <SidebarItem icon={<UserCheck />} label="Simulasi Entri Ustadz" active={activeTab === 'ocr-ustadz'} onClick={() => handleTabChange('ocr-ustadz')} />
                  <SidebarItem icon={<BarChart />} label="Laporan Metrik" active={activeTab === 'report'} onClick={() => handleTabChange('report')} />

                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-6 px-3">Modul Administrasi</p>
                  <SidebarItem icon={<FileText />} label="Pengajuan Surat" active={activeTab === 'request'} onClick={() => handleTabChange('request')} />
                  <SidebarItem icon={<FileCheck />} label="Arsip & Cetak Dokumen" active={activeTab === 'arsip'} onClick={() => handleTabChange('arsip')} />

                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-6 px-3">Evaluasi Data Bab 4</p>
                  <SidebarItem 
                      icon={isKuisionerUnlocked ? <MessageSquare /> : <Lock />} 
                      label="Kuisioner Kepuasan" 
                      active={activeTab === 'kuisioner'} 
                      onClick={() => {
                          if (isKuisionerUnlocked) handleTabChange('kuisioner');
                          else showToast("Selesaikan minimal 1x OCR Santri, 1x OCR Ustadz, dan 1x Manual untuk membuka!", "error");
                      }} 
                  />
                </React.Fragment>
              )}
              {currentRole === 'kepala' && (
                <React.Fragment>
                  <p className="text-[10px] font-extrabold text-emerald-500/80 uppercase tracking-widest mb-2 mt-4 px-3">Otoritas Pimpinan</p>
                  <SidebarItem icon={<ShieldCheck />} label="Approval Pengajuan" active={activeTab === 'approval'} onClick={() => handleTabChange('approval')} />
                  <SidebarItem icon={<FileCheck />} label="Arsip Dokumen Resmi" active={activeTab === 'arsip'} onClick={() => handleTabChange('arsip')} />
                </React.Fragment>
              )}
            </nav>

            <div className="p-4 md:p-5 bg-emerald-950/50 backdrop-blur-md relative z-10 border-t border-emerald-800/50 pb-8 md:pb-5">
              <div className="flex items-center gap-3 mb-4 md:mb-5 px-1">
                <div className="bg-emerald-800 rounded-xl p-2 shadow-inner border border-emerald-700/50"><User size={20} className="text-emerald-300" /></div>
                <div className="overflow-hidden">
                  <p className="font-bold text-sm capitalize truncate text-emerald-50">{currentRole === 'admin' ? 'Peneliti Utama' : testerInfo?.nama}</p>
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-emerald-400 truncate">Sesi Aktif ({currentRole})</p>
                </div>
              </div>
              <div className="flex flex-col gap-2">
                  <button onClick={() => { setCurrentRole(null); setActiveTab('dashboard'); }} className="w-full flex items-center justify-center gap-2 bg-emerald-500/20 text-emerald-100 hover:bg-emerald-500 hover:text-white py-2.5 rounded-xl transition-all duration-200 font-bold text-sm border border-emerald-500/30 shadow-sm">
                    <RefreshCw size={16} /> {currentRole === 'admin' ? 'Keluar Dashboard Peneliti' : 'Ganti Role Akses'}
                  </button>
                  {currentRole !== 'admin' && (
                      <button onClick={() => { setTesterInfo(null); setCurrentRole(null); setActiveTab('dashboard'); }} className="w-full flex items-center justify-center gap-2 bg-transparent text-emerald-400 hover:text-red-400 hover:bg-red-500/10 py-2 rounded-xl transition-all duration-200 font-bold text-xs">
                        <LogOut size={14} /> Reset Setup Lembaga
                      </button>
                  )}
              </div>
            </div>
          </aside>

          <main className="flex-1 p-4 md:p-6 lg:p-10 overflow-y-auto print:p-0 print:m-0 print:bg-white relative selection:bg-emerald-200 w-full">
            {activeTab === 'admin-dashboard' && <AdminDashboardView showToast={showToast} />}
            {activeTab === 'ocr-santri' && <ExperimentEntryView targetType="santri" targetData={santriData} setTargetData={setSantriData} researchLogs={researchLogs} setResearchLogs={setResearchLogs} testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'ocr-ustadz' && <ExperimentEntryView targetType="ustadz" targetData={ustadzData} setTargetData={setUstadzData} researchLogs={researchLogs} setResearchLogs={setResearchLogs} testerInfo={testerInfo} showToast={showToast} />}
            {activeTab === 'report' && <ResearchReportView researchLogs={researchLogs} showToast={showToast} />}
            {activeTab === 'request' && <RequestDocumentView ustadzData={ustadzData} dokumenReq={dokumenReq} setDokumenReq={setDokumenReq} showToast={showToast} />}
            {activeTab === 'approval' && <ApprovalView dokumenReq={dokumenReq} setDokumenReq={setDokumenReq} showToast={showToast} />}
            {activeTab === 'arsip' && <ArsipView dokumenReq={dokumenReq} testerInfo={testerInfo} />}
            {activeTab === 'kuisioner' && <KuisionerView testerInfo={testerInfo} showToast={showToast} />}
            
            {activeTab === 'dashboard' && (
              <div className="flex flex-col items-center justify-center min-h-[70vh] text-center text-emerald-900/60 animate-fade-in max-w-2xl mx-auto px-2">
                <div className="bg-emerald-100/50 p-5 md:p-6 rounded-3xl mb-4 md:mb-6 shadow-inner border border-emerald-50">
                  {currentRole === 'admin' ? <LineChart size={56} className="text-emerald-600" /> : <BookOpen size={56} className="text-emerald-600" />}
                </div>
                <h2 className="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2 md:mb-3">Selamat Datang di SIAKAD</h2>
                <p className="text-sm md:text-base text-slate-500 leading-relaxed px-2">
                  Prototipe ini dirancang untuk penelitian eksperimental fungsional perangkat lunak. Sistem menggunakan <b>Gemini AI</b> untuk mengekstrak data dari dokumen.
                </p>
                <div className="mt-6 md:mt-8 flex flex-wrap justify-center gap-2 md:gap-3">
                    <span className="px-3 md:px-4 py-1.5 md:py-2 bg-white shadow-sm border rounded-full text-[10px] md:text-xs font-bold text-slate-600 flex items-center gap-1.5"><ShieldCheck size={14} className="text-emerald-500"/> Privasi Terjamin</span>
                    <span className="px-3 md:px-4 py-1.5 md:py-2 bg-white shadow-sm border rounded-full text-[10px] md:text-xs font-bold text-slate-600 flex items-center gap-1.5"><Timer size={14} className="text-blue-500"/> Akurasi Waktu</span>
                    <span className="px-3 md:px-4 py-1.5 md:py-2 bg-white shadow-sm border rounded-full text-[10px] md:text-xs font-bold text-slate-600 flex items-center gap-1.5"><Database size={14} className="text-purple-500"/> AI Powered</span>
                </div>
              </div>
            )}
          </main>

          <ToastNotification toast={toast} setToast={setToast} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
