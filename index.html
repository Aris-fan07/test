<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Eksperimen & Administrasi LPQ</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(16, 185, 129, 0.4); border-radius: 10px; }
    input, select, textarea { font-size: 16px !important; } 
    /* CSS Print yang dibersihkan dari escaped class untuk mencegah parsing error */
    @media print { 
      @page { size: A4 portrait; margin: 0; } 
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; } 
      aside, header, .mobile-header, button:not(.print-btn) { display: none !important; }
      main { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; overflow: visible !important; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FAIcon = (faClass) => ({ size = 24, color, className = "" }) => {
      return (
        <span className={`inline-flex items-center justify-center ${className}`} style={{ color: color, width: size, height: size }}>
          <i className={`fa-solid ${faClass}`} style={{ fontSize: size * 0.8 }}></i>
        </span>
      );
    };

    const Upload = FAIcon('fa-upload'); const FileText = FAIcon('fa-file-lines'); const CheckCircle = FAIcon('fa-circle-check');
    const User = FAIcon('fa-user'); const ShieldCheck = FAIcon('fa-shield-halved'); const Users = FAIcon('fa-users');
    const FileSignature = FAIcon('fa-file-signature'); const AlertCircle = FAIcon('fa-circle-exclamation');
    const Timer = FAIcon('fa-stopwatch'); const Download = FAIcon('fa-download'); const BarChart = FAIcon('fa-chart-column');
    const Database = FAIcon('fa-database'); const RefreshCw = FAIcon('fa-arrows-rotate'); const UserCheck = FAIcon('fa-user-check');
    const ClipboardList = FAIcon('fa-clipboard-list'); const BookOpen = FAIcon('fa-book-open'); const LineChart = FAIcon('fa-chart-line');
    const Activity = FAIcon('fa-wave-square'); const X = FAIcon('fa-xmark'); const LogOut = FAIcon('fa-right-from-bracket');
    const PlusCircle = FAIcon('fa-circle-plus'); const Clock = FAIcon('fa-clock'); const QrCode = FAIcon('fa-qrcode');
    const FileSearch = FAIcon('fa-file-code'); const FileCheck = FAIcon('fa-file-circle-check'); const Search = FAIcon('fa-magnifying-glass');
    const Lock = FAIcon('fa-lock'); const MessageSquare = FAIcon('fa-comments'); const MenuIcon = FAIcon('fa-bars'); const Key = FAIcon('fa-key'); const Server = FAIcon('fa-server'); const ArrowLeft = FAIcon('fa-arrow-left');

    function ToastNotification({ toast, setToast }) {
      if (!toast.show) return null;
      return (
        <div className={`fixed bottom-4 right-4 md:bottom-6 md:right-6 p-3 md:p-4 rounded-xl md:rounded-2xl shadow-2xl text-white font-bold z-[100] flex items-center gap-3 md:gap-4 animate-fade-in w-[calc(100%-2rem)] md:max-w-sm border-2 ${toast.type === 'error' ? 'bg-red-600 border-red-500 shadow-red-500/30' : toast.type === 'success' ? 'bg-emerald-600 border-emerald-500 shadow-emerald-500/30' : 'bg-blue-600 border-blue-500 shadow-blue-500/30'}`}>
           <div className="bg-white/20 p-1.5 md:p-2 rounded-lg md:rounded-xl flex-shrink-0">
              {toast.type === 'error' ? <AlertCircle size={18} /> : toast.type === 'success' ? <CheckCircle size={18} /> : <Activity size={18} />}
           </div>
           <p className="flex-1 text-xs md:text-sm leading-snug">{toast.message}</p>
           <button onClick={() => setToast({ show: false, message: '', type: 'info' })} className="opacity-70 hover:opacity-100 flex-shrink-0 transition bg-black/10 hover:bg-black/20 p-1 rounded-md"><X size={14}/></button>
        </div>
      );
    }

    function WelcomeTesterScreen({ setTesterInfo, setRole, showToast }) {
      const [nama, setNama] = useState('');
      const [lembaga, setLembaga] = useState('');
      const [namaKepala, setNamaKepala] = useState(''); 
      const [alamat, setAlamat] = useState('');
      const [nomorIjop, setNomorIjop] = useState('');
      const [nomorStatistik, setNomorStatistik] = useState('');
      const [logo, setLogo] = useState(null);
      const [secretClicks, setSecretClicks] = useState(0);

      const handleLogoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setLogo(reader.result); };
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if(nama.trim() && lembaga.trim() && alamat.trim() && namaKepala.trim()) {
          setTesterInfo({ nama, lembaga, namaKepala, alamat, nomorIjop, nomorStatistik, logo });
        } else showToast("Nama Penguji, Lembaga, Kepala TPQ, dan Alamat wajib diisi.", "error");
      };

      return (
        <div className="min-h-[100dvh] bg-slate-900 flex flex-col items-center justify-center p-4 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] relative overflow-hidden">
          <div className="absolute top-1/4 left-1/4 w-64 md:w-96 h-64 md:h-96 bg-emerald-600/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>
          <div className="absolute bottom-1/4 right-1/4 w-64 md:w-96 h-64 md:h-96 bg-blue-600/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>

          <div className="bg-white/95 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] shadow-2xl w-full max-w-lg animate-fade-in relative z-10 border border-white/40 my-4">
            <div className="text-center mb-6 md:mb-8">
              <div className="bg-emerald-100/80 w-16 h-16 md:w-20 md:h-20 mx-auto rounded-2xl flex items-center justify-center mb-4 select-none cursor-default shadow-inner border border-emerald-200" onClick={() => { const n = secretClicks + 1; if (n >= 7) setRole('admin'); else setSecretClicks(n); }}>
                <ClipboardList color="#059669" size={32} />
              </div>
              <h1 className="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Setup Profil Lembaga</h1>
              <p className="text-slate-500 text-xs md:text-sm mt-2 font-medium">Data ini digunakan untuk men-generate Kop Surat secara otomatis.</p>
            </div>
            
            <form onSubmit={handleSubmit} className="space-y-4 md:space-y-5">
              <div className="space-y-3 md:space-y-4">
                <div>
                  <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1 md:mb-1.5 uppercase tracking-wider">Nama Lengkap Penguji <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: Ahmad Subagyo" className="w-full bg-slate-50 border border-slate-200 p-3 md:p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-2 outline-none transition font-medium text-sm md:text-base" value={nama} onChange={(e) => setNama(e.target.value)} />
                </div>
                <div>
                  <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1 md:mb-1.5 uppercase tracking-wider">Nama Lembaga <span className="text-slate-400 font-normal normal-case">(Tanpa TPQ/LPQ)</span> <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: Miftahul Ulum" className="w-full bg-slate-50 border border-slate-200 p-3 md:p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-2 outline-none transition font-medium text-sm md:text-base" value={lembaga} onChange={(e) => setLembaga(e.target.value)} />
                </div>
                <div>
                  <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1 md:mb-1.5 uppercase tracking-wider">Nama Kepala TPQ <span className="text-red-500">*</span></label>
                  <input type="text" required placeholder="Contoh: K.H. Zainudin" className="w-full bg-slate-50 border border-slate-200 p-3 md:p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-2 outline-none transition font-medium text-sm md:text-base" value={namaKepala} onChange={(e) => setNamaKepala(e.target.value)} />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                  <div>
                    <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1 md:mb-1.5 uppercase tracking-wider">Nomor Ijop</label>
                    <input type="text" placeholder="Opsional" className="w-full bg-slate-50 border border-slate-200 p-3 md:p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-2 outline-none transition font-medium text-sm md:text-base" value={nomorIjop} onChange={(e) => setNomorIjop(e.target.value)} />
                  </div>
                  <div>
                    <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1 md:mb-1.5 uppercase tracking-wider">Nomor Statistik</label>
                    <input type="text" placeholder="Opsional" className="w-full bg-slate-50 border border-slate-200 p-3 md:p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-2 outline-none transition font-medium text-sm md:text-base" value={nomorStatistik} onChange={(e) => setNomorStatistik(e.target.value)} />
                  </div>
                </div>
                <div>
                  <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1 md:mb-1.5 uppercase tracking-wider">Alamat Sekretariat Lengkap <span className="text-red-500">*</span></label>
                  <textarea required placeholder="Jalan, RT/RW, Desa, Kec, Kab..." className="w-full bg-slate-50 border border-slate-200 p-3 md:p-3.5 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-2 outline-none transition font-medium resize-none h-20 md:h-24 text-sm md:text-base" value={alamat} onChange={(e) => setAlamat(e.target.value)}></textarea>
                </div>
                <div>
                  <label className="block text-[10px] md:text-xs font-bold text-slate-700 mb-1.5 md:mb-2 uppercase tracking-wider">Logo Lembaga <span className="text-slate-400 font-normal normal-case">(Opsional)</span></label>
                  <div className="flex items-center gap-3 md:gap-4">
                    <div className="w-14 h-14 md:w-16 md:h-16 rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 flex items-center justify-center overflow-hidden flex-shrink-0">
                      {logo ? <img src={logo} className="w-full h-full object-contain"/> : <Upload color="#94a3b8" size={20} />}
                    </div>
                    <label className="flex-1 cursor-pointer bg-slate-50 border border-slate-200 hover:bg-slate-100 p-3 rounded-xl text-xs md:text-sm font-semibold text-slate-600 text-center transition">
                      Pilih File Logo
                      <input type="file" accept="image/*" onChange={handleLogoChange} className="hidden" />
                    </label>
                  </div>
                </div>
              </div>
              <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 md:py-4 rounded-xl shadow-lg shadow-emerald-600/30 mt-6 md:mt-8 transition-transform hover:-translate-y-1 text-sm md:text-base">
                Lanjutkan ke Sistem
              </button>
            </form>
          </div>
        </div>
      );
    }

    function LoginScreen({ setRole, testerInfo }) {
      return (
        <div className="min-h-[100dvh] bg-slate-900 flex flex-col items-center justify-center p-4 relative overflow-hidden">
          <div className="absolute top-1/4 left-1/4 w-64 md:w-96 h-64 md:h-96 bg-emerald-600/30 rounded-full blur-3xl mix-blend-screen pointer-events-none"></div>

          <div className="bg-white/95 backdrop-blur-xl p-6 md:p-10 rounded-[2rem] shadow-2xl w-full max-w-md text-center animate-fade-in relative z-10">
            <div className="bg-emerald-100/80 w-24 h-24 md:w-28 md:h-28 mx-auto rounded-full flex items-center justify-center mb-4 md:mb-6 shadow-inner overflow-hidden border-4 border-white">
              {testerInfo.logo ? <img src={testerInfo.logo} className="w-full h-full object-contain bg-white" /> : <ShieldCheck color="#059669" size={48} />}
            </div>
            <h1 className="text-xl md:text-2xl font-extrabold text-slate-800 mb-1 px-2 leading-tight">{testerInfo.lembaga}</h1>
            <p className="text-emerald-600 text-xs md:text-sm font-bold mb-6 md:mb-8 tracking-wide">Penguji: {testerInfo.nama}</p>
            
            <div className="space-y-3 md:space-y-4">
              <button onClick={() => setRole('operator')} className="w-full flex items-center p-3 md:p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-blue-500 transition-all group">
                <div className="bg-blue-50 p-3 md:p-4 rounded-xl group-hover:bg-blue-500 transition-all duration-300 flex-shrink-0"><User className="text-blue-600 group-hover:text-white" size={24} /></div>
                <div className="ml-4 md:ml-5 text-left"><h3 className="font-extrabold text-slate-800 text-base md:text-lg">Staf Operator</h3><p className="text-[10px] md:text-xs text-slate-500 font-medium">Uji Coba Entri Data OCR Gemini</p></div>
              </button>
              
              <button onClick={() => setRole('kepala')} className="w-full flex items-center p-3 md:p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-purple-500 transition-all group">
                <div className="bg-purple-50 p-3 md:p-4 rounded-xl group-hover:bg-purple-500 transition-all duration-300 flex-shrink-0"><CheckCircle className="text-purple-600 group-hover:text-white" size={24} /></div>
                <div className="ml-4 md:ml-5 text-left"><h3 className="font-extrabold text-slate-800 text-base md:text-lg">Pimpinan LPQ</h3><p className="text-[10px] md:text-xs text-slate-500 font-medium">Tanda Tangan & Persetujuan</p></div>
              </button>

              <div className="relative py-3 md:py-4">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                <div className="relative flex justify-center"><span className="bg-white px-4 text-[9px] md:text-[10px] text-slate-400 font-black tracking-widest">AKSES PUBLIK</span></div>
              </div>

              <button onClick={() => setRole('public')} className="w-full flex items-center p-3 md:p-4 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl hover:bg-slate-100 transition-all group">
                <div className="bg-white p-2.5 md:p-3 rounded-xl shadow-sm border border-slate-100 flex-shrink-0"><QrCode className="text-slate-700" size={20} /></div>
                <div className="ml-3 md:ml-4 text-left"><h3 className="font-bold text-slate-700 text-sm md:text-base">Verifikasi Dokumen</h3><p className="text-[10px] md:text-xs text-slate-500">Scan QR Code Surat Valid</p></div>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function PublicVerificationView({ setRole }) {
      const [docId, setDocId] = useState('');
      const [result, setResult] = useState(null);

      const handleVerify = (e) => {
        e.preventDefault();
        const docs = JSON.parse(localStorage.getItem('GLOBAL_DOCS') || '[]');
        const found = docs.find(d => d.docId === docId && d.status === 'Disetujui');
        
        if (found) {
            setResult({ valid: true, data: found });
        } else {
            setResult({ valid: false });
        }
      };

      return (
        <div className="min-h-[100dvh] bg-slate-50 flex flex-col items-center justify-center p-4 relative">
          <button onClick={() => setRole(null)} className="absolute top-6 left-6 flex items-center gap-2 text-slate-500 hover:text-slate-800 font-bold bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 transition">
             <ArrowLeft size={16} /> Kembali
          </button>

          <div className="bg-white p-6 md:p-10 rounded-[2rem] shadow-xl w-full max-w-md text-center animate-fade-in border border-slate-200 relative z-10">
            <div className="bg-slate-100 w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner text-slate-600">
               <QrCode size={40} />
            </div>
            <h1 className="text-2xl font-black text-slate-800 mb-2">Verifikasi Dokumen</h1>
            <p className="text-slate-500 text-sm font-medium mb-8">Masukkan ID Dokumen (kode di bawah Tanda Tangan Pimpinan) untuk memeriksa keasliannya.</p>
            
            <form onSubmit={handleVerify} className="space-y-4">
              <input type="text" required placeholder="Contoh: DOC-LPQ-1A2B3C" value={docId} onChange={(e) => setDocId(e.target.value.toUpperCase())} className="w-full text-center text-lg font-mono font-bold bg-slate-50 border-2 border-slate-200 p-4 rounded-xl focus:border-blue-500 focus:bg-white outline-none uppercase transition" />
              <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/30 transition-transform hover:-translate-y-1">Cek Keaslian Sekarang</button>
            </form>

            {result !== null && (
               <div className={`mt-8 p-6 rounded-2xl border-2 text-left animate-fade-in ${result.valid ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}>
                  {result.valid ? (
                      <div>
                         <div className="flex items-center gap-2 text-emerald-700 mb-4 pb-4 border-b border-emerald-200/50">
                            <CheckCircle size={24} /> <h3 className="font-black text-lg">DOKUMEN VALID</h3>
                         </div>
                         <div className="space-y-3">
                            <div><p className="text-[10px] uppercase font-bold text-emerald-600 tracking-wider">ID Dokumen</p><p className="font-mono font-bold text-slate-800">{result.data.docId}</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-emerald-600 tracking-wider">Jenis Surat</p><p className="font-bold text-slate-800">{result.data.jenis}</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-emerald-600 tracking-wider">Atas Nama</p><p className="font-bold text-slate-800">{result.data.nama}</p></div>
                            <div><p className="text-[10px] uppercase font-bold text-emerald-600 tracking-wider">Status Keaslian</p><p className="text-sm font-bold text-white bg-emerald-600 px-3 py-1 rounded-full w-max mt-1">SAH DITANDATANGANI SECARA ELEKTRONIK</p></div>
                         </div>
                      </div>
                  ) : (
                      <div className="text-center text-red-700">
                         <X size={40} className="mx-auto mb-3 text-red-500" />
                         <h3 className="font-black text-lg mb-2">DOKUMEN TIDAK DITEMUKAN</h3>
                         <p className="text-sm font-medium">ID Dokumen yang Anda masukkan salah atau dokumen tersebut palsu / tidak tercatat di pangkalan data.</p>
                      </div>
                  )}
               </div>
            )}
          </div>
        </div>
      )
    }

    function AdminDashboardView({ showToast }) {
      const [globalStats, setGlobalStats] = useState({ isLoading: true, totalPenguji: 0, totalEksperimen: 0, avgOcr: 0, avgImport: 0, avgManual: 0 });
      const [isGlobal, setIsGlobal] = useState(false);

      useEffect(() => {
        const fetchGlobalData = async () => {
            try {
                const response = await fetch('/api/gas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_stats' })
                });
                
                if (!response.ok) throw new Error("HTTP Error " + response.status);
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    if (!result?.data) throw new Error("Sistem belum di-Deploy 'New Version'.");
                    
                    setGlobalStats({ 
                        isLoading: false, 
                        totalPenguji: result.data.totalPenguji, 
                        totalEksperimen: result.data.totalEksperimen, 
                        avgOcr: result.data.avgOcr, 
                        avgImport: result.data.avgImport || 0, 
                        avgManual: result.data.avgManual 
                    });
                    setIsGlobal(true);
                    return; 
                } else {
                    throw new Error(result.error || "Error dari server backend GAS");
                }
            } catch (error) {
                console.warn("Gagal mengambil dari spreadsheet, menggunakan fallback lokal:", error);
            }

            const logs = JSON.parse(localStorage.getItem('GLOBAL_RESEARCH_LOGS') || '[]');
            const uniqueTesters = new Set(logs.map(l => l.tester)).size;
            const ocrLogs = logs.filter(l => l.method === 'OCR Gemini AI');
            const importLogs = logs.filter(l => l.method === 'Import Excel/CSV');
            const manLogs = logs.filter(l => l.method === 'Manual');
            
            const avgOcr = ocrLogs.length ? (ocrLogs.reduce((a, b) => a + b.duration, 0) / ocrLogs.length).toFixed(1) : 0;
            const avgImport = importLogs.length ? (importLogs.reduce((a, b) => a + b.duration, 0) / importLogs.length).toFixed(1) : 0;
            const avgM = manLogs.length ? (manLogs.reduce((a, b) => a + b.duration, 0) / manLogs.length).toFixed(1) : 0;

            setGlobalStats({ isLoading: false, totalPenguji: uniqueTesters || 0, totalEksperimen: logs.length || 0, avgOcr: avgOcr, avgImport: avgImport, avgManual: avgM });
            setIsGlobal(false);
        };
        
        fetchGlobalData();
      }, []);

      return (
        <div className="space-y-6 md:space-y-8 animate-fade-in pb-10">
          <header className="mb-2 md:mb-4 flex flex-col md:flex-row md:items-end md:justify-between gap-3">
            <div>
              <h2 className="text-2xl md:text-3xl font-extrabold text-slate-800">Dashboard Pusat Riset</h2>
              <p className="text-xs md:text-sm text-slate-500 font-medium mt-1 md:mt-2">Pemantauan metrik riset secara global (Tersinkronisasi via Pangkalan Data).</p>
            </div>
            {globalStats.isLoading ? (
               <span className="bg-slate-100 text-slate-500 px-3 py-2 rounded-full text-[10px] md:text-xs font-bold flex items-center gap-2 w-max"><RefreshCw size={14} className="animate-spin"/> Memuat Data...</span>
            ) : isGlobal ? (
               <span className="bg-emerald-100 text-emerald-700 px-3 py-2 rounded-full text-[10px] md:text-xs font-bold flex items-center gap-2 w-max"><Server size={14}/> Live: Terkoneksi Global</span>
            ) : (
               <span className="bg-orange-100 text-orange-700 px-3 py-2 rounded-full text-[10px] md:text-xs font-bold flex items-center gap-2 w-max"><Database size={14}/> Mode Offline (Lokal)</span>
            )}
          </header>

          <div className="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-5 gap-3 md:gap-5">
            <div className="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-slate-100 flex flex-col relative overflow-hidden">

            <div className="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl shadow-sm border border-orange-100 flex flex-col relative overflow-hidden col-span-2 md:col-span-1">

              <p className="text-2xl md:text-3xl font-black text-orange-700 relative z-10">{globalStats.avgManual}<span className="text-sm md:text-base ml-1 text-orange-500 font-bold">s</span></p>

          </div>
          
          <div className="bg-white rounded-2xl md:rounded-3xl shadow-sm border border-slate-100 overflow-hidden mt-6 md:mt-8">
             <div className="bg-slate-50/50 p-4 md:p-6 border-b border-slate-100 font-bold text-sm md:text-base text-slate-800 flex items-center gap-2 md:gap-3">
                <div className="bg-white p-1.5 md:p-2 rounded shadow-sm border"><LineChart size={16} className="text-slate-600" /></div> 
                Komparasi Kecepatan Eksekusi Global

             <div className="p-5 md:p-10 flex flex-col items-center justify-center min-h-[200px] md:min-h-[250px]">

                   <div className="w-full max-w-3xl space-y-6 md:space-y-8">
                      {globalStats.avgOcr > 0 && (
                        <div>
                           <div className="flex justify-between text-xs md:text-sm font-extrabold text-emerald-700 mb-2 md:mb-3 uppercase tracking-wide"><span>Otomasi (OCR Gemini AI)</span><span>{globalStats.avgOcr} detik</span></div>

    function AddressCascader({ formData, setFormData, prefix = '' }) {
        const getField = (field) => prefix ? `${prefix}${field.charAt(0).toUpperCase() + field.slice(1)}` : field;

        const [provinces, setProvinces] = useState([]);
        const [regencies, setRegencies] = useState([]);
        const [districts, setDistricts] = useState([]);
        const [villages, setVillages] = useState([]);

        useEffect(() => {
            fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json')
                .then(res => res.json())
                .then(setProvinces).catch(console.error);
        }, []);

        const handleChange = (e, level) => {
            const name = e.target.value;
            const id = e.target.selectedOptions?.[0]?.dataset?.id;
            
            if (level === 'provinsi') {
                setFormData(prev => ({ ...prev, [getField('provinsi')]: name, [getField('kabupaten')]: '', [getField('kecamatan')]: '', [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${id}.json`).then(r => r.json()).then(setRegencies);
                else setRegencies([]); setDistricts([]); setVillages([]);
            } else if (level === 'kabupaten') {
                setFormData(prev => ({ ...prev, [getField('kabupaten')]: name, [getField('kecamatan')]: '', [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`).then(r => r.json()).then(setDistricts);
                else setDistricts([]); setVillages([]);
            } else if (level === 'kecamatan') {
                setFormData(prev => ({ ...prev, [getField('kecamatan')]: name, [getField('desa')]: '' }));
                if (id) fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/villages/${id}.json`).then(r => r.json()).then(setVillages);
                else setVillages([]);
            } else if (level === 'desa') {
                setFormData(prev => ({ ...prev, [getField('desa')]: name }));
            } else {
                setFormData(prev => ({ ...prev, [getField(level)]: name }));
            }
        };

        return (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 md:gap-2">
                <select value={formData[getField('provinsi')] || ''} onChange={(e) => handleChange(e, 'provinsi')} className={`w-full bg-white border ${!formData[getField('provinsi')] ? 'border-red-300' : 'border-slate-300'} p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm`}>
                    <option value="">-- Pilih Provinsi * --</option>
                    {provinces.map(p => <option key={p.id} data-id={p.id} value={p.name}>{p.name}</option>)}
                </select>
                <select value={formData[getField('kabupaten')] || ''} onChange={(e) => handleChange(e, 'kabupaten')} disabled={!regencies.length} className="w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm disabled:opacity-50 bg-slate-50">
                    <option value="">-- Pilih Kab/Kota --</option>
                    {regencies.map(r => <option key={r.id} data-id={r.id} value={r.name}>{r.name}</option>)}
                </select>
                <select value={formData[getField('kecamatan')] || ''} onChange={(e) => handleChange(e, 'kecamatan')} disabled={!districts.length} className="w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm disabled:opacity-50 bg-slate-50">
                    <option value="">-- Pilih Kecamatan --</option>
                    {districts.map(d => <option key={d.id} data-id={d.id} value={d.name}>{d.name}</option>)}
                </select>
                <select value={formData[getField('desa')] || ''} onChange={(e) => handleChange(e, 'desa')} disabled={!villages.length} className="w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm disabled:opacity-50 bg-slate-50">
                    <option value="">-- Pilih Desa --</option>
                    {villages.map(v => <option key={v.id} data-id={v.id} value={v.name}>{v.name}</option>)}
                </select>
                <div className="col-span-1 lg:col-span-1 flex gap-2">
                  <input type="text" placeholder="RT" value={formData[getField('rt')] || ''} onChange={(e) => handleChange(e, 'rt')} className="w-1/2 bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm" />
                  <input type="text" placeholder="RW" value={formData[getField('rw')] || ''} onChange={(e) => handleChange(e, 'rw')} className="w-1/2 bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm" />
                </div>
                <input type="text" placeholder="Jalan / Gang / Dusun (Detail) *" value={formData[getField('alamatLengkap')] || ''} onChange={(e) => handleChange(e, 'alamatLengkap')} className={`col-span-1 md:col-span-2 w-full bg-white border ${!formData[getField('alamatLengkap')] ? 'border-red-300' : 'border-slate-300'} p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm`} />
                <input type="text" placeholder="Kode Pos" value={formData[getField('kodePos')] || ''} onChange={(e) => handleChange(e, 'kodePos')} className="col-span-1 lg:col-span-1 w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm" />
            </div>
        );
    }

    function FormVerifikasi({ entryMethod, isSantri, formData, setFormData, handleSave, isProcessing }) {
      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });
      
      const jarakOptions = ['< 5 KM', '6 - 10 KM', '11 - 15 KM', '16 - 20 KM', '21 - 25 KM', '> 25 KM'];
      const waktuTempuhOptions = ['< 10 Menit', '11 - 20 Menit', '21 - 30 Menit', '31 - 40 Menit', '41 - 50 Menit', '51 - 60 Menit', '> 60 Menit'];
      const golDarahOptions = ['A', 'B', 'AB', 'O', 'Tidak Tahu'];
      const pendapatanOptions = ['Tidak Berpenghasilan / Tidak Tahu', '< Rp 1.000.000', 'Rp 1.000.001 - Rp 2.000.000', 'Rp 2.000.001 - Rp 3.000.000', 'Rp 3.000.001 - Rp 4.000.000', 'Rp 4.000.001 - Rp 5.000.000', '> Rp 5.000.000'];
      const agamaOptions = ['Islam', 'Kristen', 'Katolik', 'Hindu', 'Buddha', 'Konghucu', 'Lainnya'];

      const renderDateInput = (name, label, required = false) => (
        <div>
           <label className="block text-[10px] md:text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide">{label} {required && <span className="text-red-500">*</span>}</label>
           <input type={entryMethod === 'manual' ? "date" : "text"} placeholder={entryMethod === 'manual' ? "" : "Sesuai Dokumen"} name={name} value={formData[name] || ''} onChange={handleChange} className={`w-full bg-white border ${required && !formData[name] ? 'border-red-300' : 'border-slate-300'} p-3 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium`} />
        </div>
      );

      const renderInput = (name, label, placeholder = "", required = false) => (
        <div>
           <label className="block text-[10px] md:text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide">{label} {required && <span className="text-red-500">*</span>}</label>
           <input type="text" name={name} placeholder={placeholder} value={formData[name] || ''} onChange={handleChange} className={`w-full bg-white border ${required && !formData[name] ? 'border-red-300' : 'border-slate-300'} p-3 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium`} />
        </div>
      );

      const renderSelect = (name, label, options, required = false) => (
        <div>
           <label className="block text-[10px] md:text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide">{label} {required && <span className="text-red-500">*</span>}</label>
           <select name={name} value={formData[name] || ''} onChange={handleChange} className={`w-full bg-white border ${required && !formData[name] ? 'border-red-300' : 'border-slate-300'} p-3 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium`}>
              <option value="">-- Pilih --</option>
              {options.map(o => <option key={o} value={o}>{o}</option>)}
           </select>
        </div>
      );

      const renderAddressOCR = (prefix = '') => {
        const getField = (field) => prefix ? `${prefix}${field.charAt(0).toUpperCase() + field.slice(1)}` : field;
        return (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 md:gap-2">
                <input name={getField('provinsi')} placeholder="Provinsi *" value={formData[getField('provinsi')] || ''} onChange={handleChange} className={`w-full bg-white border ${!formData[getField('provinsi')] ? 'border-red-300' : 'border-slate-300'} p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium`} />
                <input name={getField('kabupaten')} placeholder="Kabupaten" value={formData[getField('kabupaten')] || ''} onChange={handleChange} className="w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium" />
                <input name={getField('kecamatan')} placeholder="Kecamatan" value={formData[getField('kecamatan')] || ''} onChange={handleChange} className="w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium" />
                <input name={getField('desa')} placeholder="Desa/Kelurahan" value={formData[getField('desa')] || ''} onChange={handleChange} className="w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium" />
                <div className="col-span-1 lg:col-span-1 flex gap-2">
                    <input name={getField('rt')} placeholder="RT" value={formData[getField('rt')] || ''} onChange={handleChange} className="w-1/2 bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium" />
                    <input name={getField('rw')} placeholder="RW" value={formData[getField('rw')] || ''} onChange={handleChange} className="w-1/2 bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium" />
                </div>
                <input name={getField('alamatLengkap')} placeholder="Jalan / Dusun (Detail Lengkap) *" value={formData[getField('alamatLengkap')] || ''} onChange={handleChange} className={`col-span-1 md:col-span-2 w-full bg-white border ${!formData[getField('alamatLengkap')] ? 'border-red-300' : 'border-slate-300'} p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium`} />
                <input name={getField('kodePos')} placeholder="Kode Pos" value={formData[getField('kodePos')] || ''} onChange={handleChange} className="col-span-1 lg:col-span-1 w-full bg-white border border-slate-300 p-3 md:p-2.5 rounded-xl focus:border-emerald-500 outline-none text-xs md:text-sm font-medium" />
            </div>
        );
      };

      return (
        <form onSubmit={handleSave} className="space-y-4 md:space-y-6 animate-fade-in w-full">
          {formData.statusValidasi && (
            <div className="bg-amber-50 p-3 md:p-4 border border-amber-200 text-amber-900 rounded-xl text-xs md:text-sm flex items-start gap-2 md:gap-3 shadow-inner">
               <AlertCircle size={18} className="text-amber-600 flex-shrink-0 mt-0.5" /> 
               <div>
                  <b className="block mb-0.5">Validasi Diperlukan</b>
                  {formData.statusValidasi}
               </div>
            </div>
          )}
          
          <div className="bg-slate-50 p-4 md:p-6 rounded-2xl border border-slate-200 shadow-sm">
             <div className="flex justify-between items-center mb-4 md:mb-5">
                <h4 className="font-extrabold text-slate-700 flex items-center gap-2 text-sm md:text-base"><User size={16}/> Data Pribadi {isSantri ? 'Santri' : 'Ustadz'}</h4>
                <p className="text-[10px] text-red-500 font-bold">* Wajib diisi</p>
             </div>
             
             {isSantri ? (
                 <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                    {renderInput('noKk', 'Nomor Kartu Keluarga (KK)', '16 Digit Angka')}
                    {renderInput('nik', 'Nomor Induk Kependudukan (NIK)', '16 Digit Angka', true)}
                    {renderInput('nama', 'Nama Lengkap', '', true)}
                    {renderInput('tempatLahir', 'Tempat Lahir', '', true)}
                    {renderDateInput('tglLahir', 'Tanggal Lahir', true)}
                    {renderSelect('jenisKelamin', 'Jenis Kelamin', ['Laki-laki', 'Perempuan'], true)}
                    {renderSelect('agama', 'Agama (Sesuai KK)', agamaOptions, true)}
                 </div>
             ) : (
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4">
                    {renderInput('gelarDepan', 'Gelar Depan')}
                    {renderInput('nama', 'Nama Lengkap (Tanpa Gelar)', '', true)}
                    {renderInput('gelarBelakang', 'Gelar Belakang')}
                    
                    <div className="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 border-t pt-4 border-slate-200">
                        {renderInput('nik', 'Nomor Induk Kependudukan (NIK)', '16 Digit Angka', true)}
                        {renderInput('tempatLahir', 'Tempat Lahir', '', true)}
                        {renderDateInput('tglLahir', 'Tanggal Lahir', true)}
                        {renderSelect('jenisKelamin', 'Jenis Kelamin', ['Laki-laki', 'Perempuan'], true)}
                        {renderSelect('agama', 'Agama (Sesuai KTP)', agamaOptions, true)}
                        {renderSelect('golonganDarah', 'Golongan Darah', golDarahOptions)}
                        {renderInput('pekerjaan', 'Pekerjaan (Sesuai KTP)')}
                    </div>
                 </div>
             )}

             <div className="mt-5 md:mt-6 md:col-span-2">
                 <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wide">Alamat & Detail Geografis <span className="text-red-500">*</span></label>
                 {entryMethod === 'manual' ? <AddressCascader formData={formData} setFormData={setFormData} /> : renderAddressOCR()}
                 
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 mt-4 bg-emerald-50/50 p-3 md:p-4 rounded-xl border border-emerald-100">
                     {renderSelect('jarak', 'Jarak Rumah', jarakOptions)}
                     {renderSelect('transportasi', 'Fasilitas Transportasi', ['Jalan Kaki', 'Sepeda', 'Diantar Motor', 'Kendaraan Pribadi', 'Angkutan Umum', 'Lainnya'])}
                     {renderSelect('waktuTempuh', 'Waktu Tempuh', waktuTempuhOptions)}
                 </div>
             </div>
          </div>

          {isSantri && (
              <div className="space-y-4 md:space-y-6">
                  <div className="bg-blue-50/50 p-4 md:p-6 rounded-2xl border border-blue-100 shadow-sm">
                     <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-5 gap-2">
                         <h4 className="font-extrabold text-blue-800 flex items-center gap-2 text-sm md:text-base"><UserCheck size={16}/> Data Ayah</h4>
                         <select name="statusAyah" value={formData.statusAyah || 'Hidup'} onChange={handleChange} className="text-[10px] md:text-xs font-bold border-2 border-blue-200 rounded p-1.5 md:p-2 outline-none bg-white text-blue-800 w-full md:w-auto">
                             <option value="Hidup">Hidup (Sesuai KK)</option><option value="Meninggal">Meninggal / Tidak Diketahui</option>
                         </select>
                     </div>
                     {formData.statusAyah === 'Hidup' ? (
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            {renderInput('ayahNik', 'NIK Ayah', '16 Digit Angka', true)}
                            {renderInput('ayahNama', 'Nama Ayah', '', true)}
                            {renderInput('ayahTempatLahir', 'Tempat Lahir Ayah')}
                            {renderDateInput('ayahTglLahir', 'Tanggal Lahir Ayah')}
                            {renderInput('ayahPekerjaan', 'Pekerjaan Ayah')}
                            {renderSelect('ayahEstimasiGaji', 'Estimasi Pendapatan', pendapatanOptions)}
                         </div>
                     ) : (
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            {renderInput('ayahNama', 'Nama Ayah (Almarhum)')}
                         </div>
                     )}
                  </div>

                  <div className="bg-pink-50/50 p-4 md:p-6 rounded-2xl border border-pink-100 shadow-sm">
                     <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-5 gap-2">
                         <h4 className="font-extrabold text-pink-800 flex items-center gap-2 text-sm md:text-base"><UserCheck size={16}/> Data Ibu</h4>
                         <select name="statusIbu" value={formData.statusIbu || 'Hidup'} onChange={handleChange} className="text-[10px] md:text-xs font-bold border-2 border-pink-200 rounded p-1.5 md:p-2 outline-none bg-white text-pink-800 w-full md:w-auto">
                             <option value="Hidup">Hidup (Sesuai KK)</option><option value="Meninggal">Meninggal / Tidak Diketahui</option>
                         </select>
                     </div>
                     {formData.statusIbu === 'Hidup' ? (
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            {renderInput('ibuNik', 'NIK Ibu', '16 Digit Angka', true)}
                            {renderInput('ibuNama', 'Nama Ibu', '', true)}
                            {renderInput('ibuTempatLahir', 'Tempat Lahir Ibu')}
                            {renderDateInput('ibuTglLahir', 'Tanggal Lahir Ibu')}
                            {renderInput('ibuPekerjaan', 'Pekerjaan Ibu')}
                            {renderSelect('ibuEstimasiGaji', 'Estimasi Pendapatan', pendapatanOptions)}
                         </div>
                     ) : (
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            {renderInput('ibuNama', 'Nama Ibu (Almarhumah)')}
                         </div>
                     )}
                  </div>

                  {formData.statusAyah === 'Meninggal' && formData.statusIbu === 'Meninggal' && (
                      <div className="bg-amber-50 p-4 md:p-6 rounded-2xl border border-amber-200 shadow-sm">
                         <h4 className="font-extrabold text-amber-900 mb-4 md:mb-5 flex items-center gap-2 text-sm md:text-base"><UserCheck size={16}/> Data Wali (Jika Orang Tua Tidak Ada)</h4>
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                            {renderInput('waliNama', 'Nama Wali')}
                            {renderInput('waliHubungan', 'Hubungan dengan Santri', 'Contoh: Kakek, Paman')}
                         </div>
                      </div>
                  )}
              </div>
          )}

          {!isSantri && (
              <div className="space-y-4 md:space-y-6">
                  <div className="bg-purple-50/50 p-4 md:p-6 rounded-2xl border border-purple-100 shadow-sm">
                     <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-5 gap-2">
                         <h4 className="font-extrabold text-purple-800 flex items-center gap-2 text-sm md:text-base"><UserCheck size={16}/> Status Perkawinan</h4>
                         <select name="statusPernikahan" value={formData.statusPernikahan || ''} onChange={handleChange} className="text-[10px] md:text-xs font-bold border-2 border-purple-200 rounded p-1.5 md:p-2 outline-none bg-white text-purple-800 w-full md:w-auto">
                             <option value="">-- Pilih --</option>
                             <option value="Belum Kawin">Belum Kawin</option>
                             <option value="Kawin">Kawin</option>
                             <option value="Janda/Duda">Janda/Duda</option>
                         </select>
                     </div>
                     
                     {(formData.statusPernikahan === 'Kawin' || formData.statusPernikahan === 'Janda/Duda') && (
                         <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4">
                            {renderInput('pasanganNama', 'Nama Suami/Istri', '', formData.statusPernikahan === 'Kawin')}
                            {renderInput('jumlahAnak', 'Jumlah Anak', 'Contoh: 2')}
                            {renderInput('noKk', 'Nomor KK', '16 Digit Angka')}
                         </div>
                     )}

                     {formData.statusPernikahan === 'Belum Kawin' && (
                         <div className="grid grid-cols-1 gap-3 md:gap-4">
                            {renderInput('noKk', 'Nomor KK', '16 Digit Angka')}
                         </div>
                     )}
                  </div>

                  <div className="bg-pink-50/50 p-4 md:p-6 rounded-2xl border border-pink-100 shadow-sm">
                     <h4 className="font-extrabold text-pink-800 mb-4 md:mb-5 flex items-center gap-2 text-sm md:text-base"><UserCheck size={16}/> Informasi Ibu Kandung</h4>
                     <div className="grid grid-cols-1 gap-3 md:gap-4">
                        {renderInput('ibuNama', 'Nama Ibu')}
                     </div>
                  </div>
              </div>
          )}
          
          <button type="submit" disabled={isProcessing} className="w-full bg-emerald-700 text-white py-3 md:py-4 rounded-xl font-bold mt-6 md:mt-8 shadow-lg shadow-emerald-700/30 hover:bg-emerald-800 hover:-translate-y-1 transition-all disabled:opacity-70 flex justify-center items-center gap-2 text-sm md:text-base">
            {isProcessing ? <RefreshCw className="animate-spin" size={18}/> : <CheckCircle size={18} />} Selesaikan Sesi & Simpan Metrik
          </button>
        </form>
      );
    }

    function ExperimentEntryView({ targetType, targetData, setTargetData, researchLogs, setResearchLogs, testerInfo, showToast }) {
      const isSantri = targetType === 'santri';
      const targetLabel = isSantri ? 'Santri' : 'Ustadz';
      
      const initialStep = isSantri ? 'INPUT_NIK' : 'UPLOAD_KTP';

      const [entryMethod, setEntryMethod] = useState('ocr');
      const [isTimerRunning, setIsTimerRunning] = useState(false);
      const [timeElapsed, setTimeElapsed] = useState(0);
      const [isProcessingGas, setIsProcessingGas] = useState(false);
      
      const [ocrStep, setOcrStep] = useState(initialStep);
      const [tempNik, setTempNik] = useState('');

      const [rawFile, setRawFile] = useState(null);
      const [filePreview, setFilePreview] = useState(null);
      const [isExtracting, setIsExtracting] = useState(false);

      const emptyFormSantri = { 
          nik: '', noKk: '', nama: '', tempatLahir: '', tglLahir: '', jenisKelamin: '', agama: '',
          provinsi: '', kabupaten: '', kecamatan: '', desa: '', rt: '', rw: '', alamatLengkap: '', kodePos: '',
          jarak: '', transportasi: '', waktuTempuh: '',
          statusAyah: 'Hidup', ayahNik: '', ayahNama: '', ayahTempatLahir: '', ayahTglLahir: '', ayahPekerjaan: '', ayahEstimasiGaji: '',
          statusIbu: 'Hidup', ibuNik: '', ibuNama: '', ibuTempatLahir: '', ibuTglLahir: '', ibuPekerjaan: '', ibuEstimasiGaji: '',
          waliNama: '', waliHubungan: '',
          statusValidasi: '' 
      };
      
      const emptyFormUstadz = {
          nik: '', gelarDepan: '', nama: '', gelarBelakang: '', tempatLahir: '', tglLahir: '', jenisKelamin: '', agama: '', golonganDarah: '', statusPernikahan: '', pekerjaan: '',
          provinsi: '', kabupaten: '', kecamatan: '', desa: '', rt: '', rw: '', alamatLengkap: '', kodePos: '',
          jarak: '', transportasi: '', waktuTempuh: '',
          noKk: '', pasanganNama: '', jumlahAnak: '',
          ibuNama: '',
          statusValidasi: ''
      };

      const emptyForm = isSantri ? emptyFormSantri : emptyFormUstadz;
      const [formData, setFormData] = useState(emptyForm);

      useEffect(() => {
        let interval;
        if (isTimerRunning && !isProcessingGas) interval = setInterval(() => setTimeElapsed(prev => prev + 1), 1000);
        return () => clearInterval(interval);
      }, [isTimerRunning, isProcessingGas]);

      const formatTime = (secs) => `${Math.floor(secs / 60).toString().padStart(2, '0')}:${(secs % 60).toString().padStart(2, '0')}`;

      const handleStartExperiment = () => {
        setIsTimerRunning(true); setTimeElapsed(0); setOcrStep(initialStep); setRawFile(null); setFilePreview(null); setFormData(emptyForm); setTempNik('');
      };

      const cancelExperiment = () => {
        setIsTimerRunning(false); setTimeElapsed(0); setOcrStep(initialStep); setRawFile(null); setFilePreview(null); setFormData(emptyForm); setTempNik('');
      };

      const handleFileChange = (e) => { 
        if (e.target.files[0]) {
          setRawFile(e.target.files[0]);
          if(e.target.files[0].type.includes('image')) {
            setFilePreview(URL.createObjectURL(e.target.files[0]));
          }
        }
      };

      const handleNikSubmit = (e) => {
          e.preventDefault();
          if(!tempNik) return showToast("Masukkan NIK terlebih dahulu", "error");
          setFormData(prev => ({...prev, nik: tempNik}));
          setOcrStep('UPLOAD_KK');
      };

      const processImageForOCR = async (file) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                  const img = new Image();
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      const MAX_DIM = 1024; 
                      let w = img.width; let h = img.height;
                      
                      if (w > MAX_DIM || h > MAX_DIM) {
                          if (w > h) { h = (h/w)*MAX_DIM; w = MAX_DIM; }
                          else { w = (w/h)*MAX_DIM; h = MAX_DIM; }
                      }
                      
                      canvas.width = w; canvas.height = h;
                      const ctx = canvas.getContext('2d');
                      ctx.drawImage(img, 0, 0, w, h);
                      
                      const base64Str = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                      resolve({ mimeType: 'image/jpeg', data: base64Str });
                  };
                  img.onerror = () => reject(new Error("Gagal memuat gambar"));
                  img.src = e.target.result;
              };
              reader.onerror = () => reject(new Error("Gagal membaca file"));
              reader.readAsDataURL(file);
          });
      };

      const fetchWithRetry = async (url, options, retries = 3) => {
        const delays = [1000, 2000, 4000];
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                const json = await response.json();
                
                if (!response.ok) {
                    throw new Error(json.error?.message || json.error || `HTTP Error ${response.status}`);
                }
                return json;
            } catch (e) {
                if (i === retries - 1) throw e; 
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }
      };

      const runGeminiOCRSantriKK = async () => {
        if (!rawFile) return showToast("Pilih gambar KK terlebih dahulu!", "error");
        setIsExtracting(true);
        
        try {
            const imageData = await processImageForOCR(rawFile);
            const promptText = `Ekstrak informasi dari dokumen Kartu Keluarga ini. Cari anak dengan NIK: ${formData.nik} dan ekstrak datanya secara lengkap, PASTIKAN kolom "agama" terisi sesuai dengan KK. Terakhir, cari data Kepala Keluarga (Ayah) dan Isteri (Ibu).\n\nBerikan HANYA format JSON (tanpa awalan markdown) dengan format persis berikut:\n{"noKk":"","nama":"","tempatLahir":"","tglLahir":"YYYY-MM-DD","jenisKelamin":"Laki-laki/Perempuan","agama":"","provinsi":"","kabupaten":"","kecamatan":"","desa":"","rt":"","rw":"","alamatLengkap":"","kodePos":"","statusAyah":"Hidup/Meninggal","ayahNik":"","ayahNama":"","ayahTempatLahir":"","ayahTglLahir":"YYYY-MM-DD","ayahPekerjaan":"","ayahEstimasiGaji":"","statusIbu":"Hidup/Meninggal","ibuNik":"","ibuNama":"","ibuTempatLahir":"","ibuTglLahir":"YYYY-MM-DD","ibuPekerjaan":"","ibuEstimasiGaji":"","waliNama":"","waliHubungan":""}`;
            
            const payload = {
                contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: imageData }] }]
            };

            const url = `/api/gemini`;
            const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            
            const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (jsonText) {
                const cleanJson = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                const data = JSON.parse(cleanJson);
                setFormData(prev => ({ ...prev, ...data, statusValidasi: 'Ekstraksi KK Selesai. Silakan lengkapi form.' }));
                setOcrStep('FORM');
                showToast("Berhasil mengekstrak data dari KK.", "success");
            } else {
                throw new Error("Respon AI kosong");
            }
        } catch (error) {
            console.error("OCR Error:", error);
            showToast(`Gagal: ${error.message}`, "error"); 
        } finally {
            setIsExtracting(false); setRawFile(null); setFilePreview(null);
        }
      };

      const runGeminiOCRUstadzKTP = async () => {
          if (!rawFile) return showToast("Pilih gambar KTP terlebih dahulu!", "error");
          setIsExtracting(true);
          
          try {
              const imageData = await processImageForOCR(rawFile);
              const promptText = `Ekstrak informasi dari dokumen KTP ini. Pisahkan nama menjadi tiga bagian: gelarDepan, nama (tanpa gelar), dan gelarBelakang. PASTIKAN mengekstrak kolom "agama" dan "golonganDarah" sesuai KTP. Untuk "statusPernikahan", petakan menjadi salah satu dari: "Belum Kawin", "Kawin", atau "Janda/Duda" berdasarkan status di KTP.\n\nBerikan HANYA format JSON (tanpa awalan markdown) dengan format persis berikut:\n{"nik":"","gelarDepan":"","nama":"","gelarBelakang":"","tempatLahir":"","tglLahir":"YYYY-MM-DD","jenisKelamin":"Laki-laki/Perempuan","agama":"","golonganDarah":"","statusPernikahan":"","pekerjaan":"","provinsi":"","kabupaten":"","kecamatan":"","desa":"","rt":"","rw":"","alamatLengkap":"","kodePos":""}`;

              const payload = {
                  contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: imageData }] }]
              };

              const url = `/api/gemini`;
              const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              
              const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (jsonText) {
                  const cleanJson = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                  const data = JSON.parse(cleanJson);
                  setFormData(prev => ({ ...prev, ...data }));
                  setOcrStep('UPLOAD_KK_USTADZ');
                  showToast("KTP terbaca. Silakan lanjut upload KK.", "info");
              } else { 
                  throw new Error("Respon AI kosong"); 
              }
          } catch (error) { 
              console.error("OCR Error:", error);
              showToast(`Gagal: ${error.message}`, "error"); 
          } finally { 
              setIsExtracting(false); setRawFile(null); setFilePreview(null); 
          }
      };

      const runGeminiOCRUstadzKK = async () => {
          if (!rawFile) return showToast("Pilih gambar KK terlebih dahulu!", "error");
          setIsExtracting(true);
          
          try {
              const imageData = await processImageForOCR(rawFile);
              const promptText = `Ekstrak informasi dari Kartu Keluarga ini. Temukan Nomor KK (noKk). Cari data Ibu kandung dari ustadz tersebut (ibuNama). Jika statusnya kawin/janda/duda, temukan nama suami/istri (pasanganNama) dan hitung jumlah anak (jumlahAnak) jika ada.\n\nBerikan HANYA format JSON (tanpa awalan markdown) dengan format persis berikut:\n{"noKk":"","ibuNama":"","pasanganNama":"","jumlahAnak":""}`;
              
              const payload = {
                  contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: imageData }] }]
              };

              const url = `/api/gemini`;
              const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              
              const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (jsonText) {
                  const cleanJson = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                  const data = JSON.parse(cleanJson);
                  setFormData(prev => ({ ...prev, ...data, statusValidasi: 'Ekstraksi KTP & KK Selesai. Silakan lengkapi form.' }));
                  setOcrStep('FORM');
                  showToast("Berhasil mengekstrak data Pelengkap dari KK.", "success");
              } else { 
                  throw new Error("Respon AI kosong"); 
              }
          } catch (error) { 
              console.error("OCR Error:", error);
              showToast(`Gagal: ${error.message}`, "error"); 
          } finally { 
              setIsExtracting(false); setRawFile(null); setFilePreview(null); 
          }
      };

      const handleSaveAndStop = async (e) => {
        e.preventDefault();
        
        if(!formData.nik || !formData.nama || !formData.tempatLahir || !formData.tglLahir || !formData.jenisKelamin || !formData.provinsi || !formData.agama || !formData.alamatLengkap) {
            return showToast("Gagal Disimpan! Pastikan data berlabel tanda bintang merah (*) sudah terisi.", "error");
        }
        
        if (isSantri) {
            if (formData.statusAyah === 'Hidup' && (!formData.ayahNik || !formData.ayahNama)) {
                return showToast("Gagal Disimpan! NIK dan Nama Ayah wajib diisi jika statusnya Hidup.", "error");
            }
            if (formData.statusIbu === 'Hidup' && (!formData.ibuNik || !formData.ibuNama)) {
                return showToast("Gagal Disimpan! NIK dan Nama Ibu wajib diisi jika statusnya Hidup.", "error");
            }
        } else {
            if (formData.statusPernikahan === 'Kawin' && !formData.pasanganNama) {
                return showToast("Gagal Disimpan! Nama Suami/Istri wajib diisi jika status perkawinan Kawin.", "error");
            }
        }
        
        setIsTimerRunning(false); setIsProcessingGas(true);

        const methodUsed = entryMethod === 'ocr' ? 'OCR Gemini AI' : 'Manual';
        
        const payloadData = { 
            action: 'log_eksperimen',
            testerNama: testerInfo.nama, 
            testerLembaga: testerInfo.lembaga, 
            target: targetLabel, 
            method: methodUsed, 
            waktuTempuhDetik: timeElapsed 
        };

        try {
          await fetch('/api/gas', { 
             method: 'POST', 
             headers: { 'Content-Type': 'application/json' }, 
             body: JSON.stringify(payloadData) 
          });
        } catch(e) {
          console.error("Gagal mengirim ke GAS via Proxy", e);
        }

        const newLog = { id: `LOG-${Date.now().toString().slice(-4)}`, tester: testerInfo.nama, target: targetLabel, method: methodUsed, duration: timeElapsed, timestamp: new Date().toLocaleTimeString('id-ID') };
        setResearchLogs([...researchLogs, newLog]);
        
        const globalLogs = JSON.parse(localStorage.getItem('GLOBAL_RESEARCH_LOGS') || '[]');
        localStorage.setItem('GLOBAL_RESEARCH_LOGS', JSON.stringify([...globalLogs, newLog]));
        
        const newIdPrefix = isSantri ? 'SNT' : 'UST';
        const namaLengkap = isSantri ? formData.nama : `${formData.gelarDepan ? formData.gelarDepan + ' ' : ''}${formData.nama}${formData.gelarBelakang ? ', ' + formData.gelarBelakang : ''}`;
        const gabunganAlamat = [formData.alamatLengkap, (formData.rt || formData.rw) ? `RT ${formData.rt||'-'}/RW ${formData.rw||'-'}` : null, formData.desa, formData.kecamatan ? `Kec. ${formData.kecamatan}` : null, formData.kabupaten, formData.provinsi ? `Prov. ${formData.provinsi}` : null].filter(Boolean).join(', ');
        
        setTargetData([...targetData, { id: `${newIdPrefix}-${Date.now().toString().slice(-4)}`, ...formData, nama: namaLengkap, alamat: gabunganAlamat, status: 'Aktif' }]);
        
        setFormData(emptyForm); setOcrStep(initialStep); setIsProcessingGas(false); setTempNik('');
        showToast(`Berhasil! Waktu entri tercatat: ${timeElapsed} detik.`, "success");
      };

      return (
        <div className="space-y-4 md:space-y-6 animate-fade-in max-w-5xl mx-auto w-full">
          <header className="mb-4 md:mb-6">
            <h2 className="text-2xl md:text-3xl font-extrabold text-slate-800 flex items-center gap-2 md:gap-3">
              <div className="bg-blue-100 p-1.5 md:p-2 rounded-xl text-blue-600">{isSantri ? <Users size={24} /> : <UserCheck size={24} />}</div>
              Entri {targetLabel}
            </h2>
            <p className="text-xs md:text-sm text-slate-500 font-medium mt-1 md:mt-2">Bandingkan kecepatan sistem otomatis AI vs konvensional.</p>
          </header>

          <div className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6 relative overflow-hidden">
            <div className="relative z-10 w-full md:w-auto">
              <h3 className="font-bold text-slate-700 mb-2 md:mb-3 text-[10px] md:text-xs uppercase tracking-widest text-center md:text-left">Pilih Instrumen</h3>
              <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200/60 shadow-inner w-full md:w-auto">
                <button onClick={() => { if(!isTimerRunning){ setEntryMethod('ocr'); setOcrStep(initialStep); } }} disabled={isTimerRunning} className={`flex-1 md:flex-none px-3 md:px-4 py-2 md:py-2.5 text-xs md:text-sm font-extrabold rounded-lg transition-all ${entryMethod === 'ocr' ? 'bg-white shadow-sm text-emerald-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}>OCR Gemini AI</button>
                <button onClick={() => { if(!isTimerRunning){ setEntryMethod('manual'); setOcrStep('FORM'); } }} disabled={isTimerRunning} className={`flex-1 md:flex-none px-3 md:px-4 py-2 md:py-2.5 text-xs md:text-sm font-extrabold rounded-lg transition-all ${entryMethod === 'manual' ? 'bg-white shadow-sm text-blue-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}>Ketik Manual</button>
              </div>
            </div>

            <div className="flex flex-col md:flex-row items-center gap-3 md:gap-4 w-full md:w-auto relative z-10">
              <div className={`w-full md:w-auto flex items-center justify-center gap-2 md:gap-3 px-4 md:px-6 py-2.5 md:py-3 rounded-xl md:rounded-2xl font-mono text-2xl md:text-3xl font-black border-2 transition-colors ${isTimerRunning && !isProcessingGas ? 'bg-red-50 text-red-600 border-red-200 animate-pulse shadow-inner' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                <Timer size={24} className={isTimerRunning && !isProcessingGas ? 'text-red-500' : 'text-slate-400'} /> {formatTime(timeElapsed)}
              </div>
              {!isTimerRunning ? (
                <button onClick={handleStartExperiment} className="w-full md:w-auto bg-emerald-600 text-white px-6 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-bold shadow-lg shadow-emerald-600/30 hover:bg-emerald-700 hover:-translate-y-1 transition-all text-sm md:text-base">Mulai</button>
              ) : (
                <button onClick={cancelExperiment} className="w-full md:w-auto bg-slate-200 text-slate-700 px-6 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-bold hover:bg-slate-300 transition-all border border-slate-300 text-sm md:text-base">Batal</button>
              )}
            </div>
          </div>

          {isTimerRunning && entryMethod === 'ocr' && isSantri && (
            <div className="bg-white p-2 rounded-2xl md:rounded-3xl shadow-sm border border-emerald-100 animate-fade-in w-full overflow-hidden">
              <div className="flex items-center justify-between m-2 md:m-4 bg-emerald-50/50 p-3 md:p-4 rounded-xl md:rounded-2xl border border-emerald-100 shadow-inner text-[10px] md:text-xs">
                  <div className={`font-bold flex flex-col md:flex-row items-center gap-1 md:gap-2 text-center md:text-left ${ocrStep === 'INPUT_NIK' || ocrStep === 'UPLOAD_KK' || ocrStep === 'FORM' ? 'text-emerald-700' : 'text-slate-400'}`}><div className={`w-6 h-6 md:w-8 md:h-8 rounded-full flex justify-center items-center ${ocrStep === 'INPUT_NIK' || ocrStep === 'UPLOAD_KK' || ocrStep === 'FORM' ? 'bg-emerald-200 text-emerald-800' : 'bg-slate-200'}`}>1</div><span className="hidden md:inline">Input NIK</span></div>
                  <div className={`h-1 flex-1 mx-1 md:mx-3 rounded-full ${ocrStep === 'UPLOAD_KK' || ocrStep === 'FORM' ? 'bg-emerald-500' : 'bg-slate-200'}`}></div>
                  <div className={`font-bold flex flex-col md:flex-row items-center gap-1 md:gap-2 text-center md:text-left ${ocrStep === 'UPLOAD_KK' || ocrStep === 'FORM' ? 'text-emerald-700' : 'text-slate-400'}`}><div className={`w-6 h-6 md:w-8 md:h-8 rounded-full flex justify-center items-center ${ocrStep === 'UPLOAD_KK' || ocrStep === 'FORM' ? 'bg-emerald-200 text-emerald-800' : 'bg-slate-200'}`}>2</div><span className="hidden md:inline">Upload KK</span></div>
                  <div className={`h-1 flex-1 mx-1 md:mx-3 rounded-full ${ocrStep === 'FORM' ? 'bg-emerald-500' : 'bg-slate-200'}`}></div>
                  <div className={`font-bold flex flex-col md:flex-row items-center gap-1 md:gap-2 text-center md:text-left ${ocrStep === 'FORM' ? 'text-emerald-700' : 'text-slate-400'}`}><div className={`w-6 h-6 md:w-8 md:h-8 rounded-full flex justify-center items-center ${ocrStep === 'FORM' ? 'bg-emerald-200 text-emerald-800' : 'bg-slate-200'}`}>3</div><span className="hidden md:inline">Verifikasi</span></div>

              action: 'submit_kuisioner',
              sheetName: 'Kuisioner', 
              testerNama: testerInfo.nama,
              testerLembaga: testerInfo.lembaga,
              a1, a2, a3, b1, b2, b3, c1, c2, c3, d1, d2, d3, e1, e2, e3,
              kendala: kendala,
              saran: saran,
              timestamp: new Date().toLocaleString('id-ID')

          try {

                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },

              setSubmitted(true);
              showToast("Kuisioner Skala Likert berhasil disimpan untuk analisis Bab 4!", "success");

    function RequestDocumentView({ ustadzData, dokumenReq, setDokumenReq, showToast }) {

        const newReq = { 
          id: `REQ-${Date.now().toString().slice(-4)}`, 
          nama: uInfo.nama, 
          ttl: `${uInfo.tempatLahir}, ${uInfo.tglLahir}`,
          alamat: uInfo.alamat || 'Alamat sesuai KTP/KK',

          status: 'Pending', 
          docId: null
